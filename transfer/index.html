<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v9.1 | Clean UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #121212; 
            --bg-card: #1e1e1e; 
            --bg-input: #2b2b2b;
            --text-main: #f0f0f0; 
            --text-muted: #a0a0a0;
            --accent-blue: #3da9fc; 
            --accent-green: #2cb67d; 
            --accent-gold: #ffd700;
            --danger: #ef476f; 
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
            background-color: var(--bg-body); color: var(--text-main);
            margin: 0; padding-bottom: 300px;
        }

        /* --- ORTAK ELEMENTLER --- */
        button, select, input { font-family: inherit; outline: none; }
        
        /* HEADER */
        header {
            background-color: var(--bg-card); padding: 0 2rem; 
            display: flex; justify-content: space-between; align-items: center;
            height: 80px; border-bottom: 1px solid var(--border-color); 
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .brand i { color: var(--accent-blue); margin-right: 8px; }

        .user-profile { display: flex; align-items: center; gap: 15px; text-align: right; }
        .user-avatar {
            width: 40px; height: 40px; background: var(--accent-blue);
            color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 800;
        }

        /* MENÜ */
        .nav-tabs { display: flex; justify-content: center; background: #0d0d0d; padding: 15px 0; gap: 10px; border-bottom: 1px solid var(--border-color); }
        .tab-btn {
            background: transparent; border: 1px solid #333; color: var(--text-muted);
            padding: 10px 25px; cursor: pointer; border-radius: 30px; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
        .tab-btn i { margin-right: 6px; }

        /* --- FİLTRE PANELİ --- */
        .section-container { display: none; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section-container.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .filter-panel {
            background: var(--bg-card); padding: 25px; border-radius: 12px;
            border: 1px solid var(--border-color); margin-bottom: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .filter-row { display: flex; gap: 15px; flex-wrap: wrap; }
        
        .search-input, .filter-select { 
            height: 45px; padding: 0 15px; background: var(--bg-input); 
            border: 1px solid var(--border-color); color: #fff; border-radius: 8px; 
            flex: 1; font-size: 0.95rem; min-width: 150px;
        }
        .search-input:focus, .filter-select:focus { border-color: var(--accent-blue); }

        .btn-action { 
            height: 45px; padding: 0 25px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; background: var(--accent-blue); color: #000;
        }

        /* --- OYUNCU KARTLARI (DÜZELTİLMİŞ) --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .player-card {
            background: var(--bg-card); border-radius: 12px; 
            border: 1px solid var(--border-color); transition: 0.3s; 
            position: relative; display: flex; flex-direction: column; overflow: hidden;
        }
        .player-card:hover { transform: translateY(-5px); border-color: #555; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Üst Çizgi */
        .player-card::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
        }

        /* Kart Header: Genişletilmiş Boşluklar */
        .card-header { padding: 20px; display: flex; align-items: flex-start; gap: 15px; }

        .rating-circle {
            width: 50px; height: 50px; background: #151515;
            border: 2px solid var(--accent-green); color: var(--accent-green); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.2rem; flex-shrink: 0;
            box-shadow: 0 0 10px rgba(44, 182, 125, 0.2);
        }

        .player-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .player-info h3 { margin: 0; font-size: 1.15rem; color: #fff; line-height: 1.2; }
        .player-info span { font-size: 0.85rem; color: #888; display: block; }
        .player-info i { color: var(--accent-blue); width: 15px; text-align: center; }

        /* Yıldız Butonu */
        .fav-btn {
            background: none; border: none; color: #444; font-size: 1.2rem; 
            cursor: pointer; transition: 0.2s; padding: 0; margin-left: auto;
        }
        .fav-btn.active { color: var(--accent-gold); }
        .fav-btn:hover { color: var(--accent-gold); transform: scale(1.1); }

        /* Durum Rozeti */
        .status-badge {
            margin: 0 20px 15px 20px; /* Kenarlardan boşluk */
            padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .st-free { background: rgba(61, 169, 252, 0.1); color: var(--accent-blue); border: 1px solid rgba(61, 169, 252, 0.2); }
        .st-pending { background: rgba(255, 215, 0, 0.1); color: var(--accent-gold); border: 1px solid rgba(255, 215, 0, 0.2); }

        /* İstatistikler */
        .card-stats {
            padding: 15px 20px; background: rgba(255,255,255,0.02);
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            border-top: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a;
        }
        .stat-item span { display: block; font-size: 0.75rem; color: #777; text-transform: uppercase; margin-bottom: 3px; }
        .stat-item strong { color: #ddd; font-size: 1rem; }

        /* Aksiyon Butonu */
        .card-actions { padding: 20px; margin-top: auto; }
        .btn-offer {
            width: 100%; padding: 12px; background: transparent;
            color: var(--accent-green); border: 1px solid var(--accent-green);
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-offer:hover { background: var(--accent-green); color: #000; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #555; }

        /* --- GİRİŞ & MODAL --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid #333; text-align: center; width: 90%; max-width: 800px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 30px; }
        .team-btn { 
            background: #252525; border: 1px solid #333; color: #ccc; padding: 20px; 
            border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; 
        }
        .team-btn:hover { border-color: var(--accent-blue); background: #2a2a2a; color: #fff; }

        #passwordModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .pass-content { background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--accent-blue); width: 300px; text-align: center; }

        /* ADMIN PANEL */
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 250px; background: #080808; border-top: 1px solid var(--danger); z-index: 8000; display: none; }
        .admin-sidebar { width: 220px; padding: 20px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .admin-content { flex: 1; padding: 20px; overflow-y: auto; color: #ccc; font-family: monospace; font-size: 0.85rem; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 3px; }

    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="margin:0; color:#fff;">TRANSFER LİGİ</h1>
        <p style="color:#888;">Menajer Giriş Ekranı</p>
        
        <div class="team-grid">
            <div class="team-btn" onclick="openPassModal('Galatasaray', 'GS', 85, '1905')">
                <i class="fas fa-shield-alt" style="color:#e74c3c"></i> <span>GS</span>
            </div>
            <div class="team-btn" onclick="openPassModal('Fenerbahçe', 'FB', 85, '1907')">
                <i class="fas fa-shield-alt" style="color:#f1c40f"></i> <span>FB</span>
            </div>
            <div class="team-btn" onclick="openPassModal('Beşiktaş', 'BJK', 80, '1903')">
                <i class="fas fa-shield-alt" style="color:#fff"></i> <span>BJK</span>
            </div>
            <div class="team-btn" onclick="openPassModal('Trabzonspor', 'TS', 75, '1967')">
                <i class="fas fa-shield-alt" style="color:#a55eea"></i> <span>TS</span>
            </div>
            <div class="team-btn" onclick="openPassModal('Göztepe', 'GOZ', 65, '1925')">
                <i class="fas fa-shield-alt" style="color:#f39c12"></i> <span>GÖZ</span>
            </div>
        </div>
    </div>
</div>

<div id="passwordModal">
    <div class="pass-content">
        <h3 id="passTitle" style="color:var(--accent-blue); margin-top:0;">Şifre Giriniz</h3>
        <p style="font-size:0.8rem; color:#888;">(İpucu: Kuruluş Yılı)</p>
        <input type="password" id="passInput" class="search-input" style="width:100%; text-align:center; font-size:1.2rem; letter-spacing:5px;" maxlength="4" placeholder="****">
        <div id="passError" style="color:var(--danger); display:none; margin-top:10px;">Hatalı Şifre</div>
        <button class="btn-action" onclick="checkPassword()" style="width:100%; margin-top:15px;">Giriş Yap</button>
        <button onclick="closePassModal()" style="background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">İptal</button>
    </div>
</div>

<header>
    <div class="brand"><i class="fas fa-bolt"></i> TRANSFER v9.1</div>
    <div class="user-profile">
        <div style="line-height:1.2">
            <h4 id="headerTeamName" style="margin:0; font-size:0.9rem; color:#fff;">--</h4>
            <div style="font-size:0.75rem; color:var(--accent-gold);">İtibar: <span id="headerRep">--</span></div>
        </div>
        <div class="user-avatar" id="headerAvatar">?</div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--danger); margin-left:15px; cursor:pointer;"></i>
    </div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-transfer" onclick="switchTab('transfer')"><i class="fas fa-globe"></i> Transfer</button>
    <button class="tab-btn" id="btn-scout" onclick="switchTab('scout')"><i class="fas fa-binoculars"></i> Scout</button>
    <button class="tab-btn" id="btn-watchlist" onclick="switchTab('watchlist')"><i class="fas fa-star"></i> Takip</button>
</div>

<div id="transfer" class="section-container active">
    
    <div class="filter-panel">
        <div class="filter-row">
            <input type="text" id="tName" class="search-input" placeholder="İsim ara..." style="flex:2">
            <input type="text" id="tNation" class="search-input" placeholder="Uyruk (Örn: Türkiye)..." style="flex:1">
        </div>
        
        <div class="filter-row">
            <select id="tLeague" class="filter-select" onchange="updateTeamSelect()">
                <option value="">Tüm Ligler</option>
                <option value="Süper Lig">Süper Lig</option>
                <option value="Premier League">Premier League</option>
                <option value="La Liga">La Liga</option>
                <option value="Bundesliga">Bundesliga</option>
                <option value="Serie A">Serie A</option>
                <option value="Ligue 1">Ligue 1</option>
            </select>
            
            <select id="tTeam" class="filter-select" disabled>
                <option value="">Önce Lig Seçiniz</option>
            </select>

            <select id="tPos" class="filter-select">
                <option value="">Mevki</option>
                <option value="ST">Forvet</option>
                <option value="LW">Sol Kanat</option>
                <option value="RW">Sağ Kanat</option>
                <option value="CAM">Ofansif Orta</option>
                <option value="CM">Orta Saha</option>
                <option value="CB">Stoper</option>
                <option value="GK">Kaleci</option>
            </select>

            <button class="btn-action" onclick="applyFilters()"><i class="fas fa-search"></i></button>
        </div>
        <div id="filterMsg" style="color:#888; font-size:0.85rem; margin-left:5px;"></div>
    </div>

    <div class="grid" id="transferGrid"></div>
</div>

<div id="scout" class="section-container">
    <div style="text-align:center; color:#666; margin-top:50px;">Scout ofisi yükleniyor...</div>
</div>

<div id="watchlist" class="section-container">
    <div style="text-align:center; color:#666; margin-bottom:20px;">Takip Listesi</div>
    <div class="grid" id="watchlistGrid"></div>
</div>

<div id="adminPanel">
    <div class="admin-sidebar">
        <h4 style="margin:0; color:var(--danger); border-bottom:1px solid #333; padding-bottom:10px;">
            <i class="fas fa-traffic-light"></i> TRAFİK POLİSİ
        </h4>
        <div style="font-size:0.75rem; color:#888; margin-top:10px;">
            İşlem Kuyruğu: <strong id="queueCount" style="color:var(--accent-blue)">0</strong>
        </div>
        <button class="btn-action" onclick="simulateWeek()" style="margin-top:auto; background:var(--danger); color:#fff;">
            <i class="fas fa-fast-forward"></i> İLERLET
        </button>
    </div>
    <div class="admin-content" id="simLog">
        <div style="color:yellow">> Sistem hazır.</div>
    </div>
</div>

<script>
    // --- VERİTABANI & AYARLAR ---
    let currentUser = null; 
    let pendingLogin = null;
    let actionQueue = []; 
    let watchlist = []; 

    // Takım Listesi (Liglere Göre)
    const teamsByLeague = {
        "Süper Lig": ["Galatasaray", "Fenerbahçe", "Beşiktaş", "Trabzonspor", "Başakşehir", "Göztepe", "Samsunspor"],
        "Premier League": ["Man City", "Arsenal", "Liverpool", "Man Utd", "Chelsea"],
        "La Liga": ["Real Madrid", "Barcelona", "Atletico Madrid"],
        "Bundesliga": ["Bayern Münih", "Dortmund", "Leverkusen", "Nürnberg"],
        "Ligue 1": ["PSG", "Lille", "Monaco", "Lyon"],
        "Serie A": ["Inter", "Milan", "Juventus", "Napoli"]
    };

    // Oyuncu Verisi
    const playersDB = [
        { id: 1, name: "Mauro Icardi", team: "Galatasaray", league: "Süper Lig", nation: "Arjantin", pos: "ST", rating: 83, val: 20000000, status: 'free', offers: [] },
        { id: 2, name: "Edin Dzeko", team: "Fenerbahçe", league: "Süper Lig", nation: "Bosna Hersek", pos: "ST", rating: 81, val: 4000000, status: 'free', offers: [] },
        { id: 3, name: "Kerem Aktürkoğlu", team: "Galatasaray", league: "Süper Lig", nation: "Türkiye", pos: "LW", rating: 79, val: 15000000, status: 'free', offers: [] },
        { id: 4, name: "Erling Haaland", team: "Man City", league: "Premier League", nation: "Norveç", pos: "ST", rating: 91, val: 180000000, status: 'free', offers: [] },
        { id: 5, name: "Can Uzun", team: "Nürnberg", league: "Bundesliga", nation: "Türkiye", pos: "CAM", rating: 76, val: 12000000, status: 'free', offers: [] },
        { id: 6, name: "Yusuf Yazıcı", team: "Lille", league: "Ligue 1", nation: "Türkiye", pos: "CAM", rating: 78, val: 10000000, status: 'free', offers: [] },
        { id: 7, name: "Ferdi Kadıoğlu", team: "Fenerbahçe", league: "Süper Lig", nation: "Türkiye", pos: "LW", rating: 80, val: 20000000, status: 'free', offers: [] }
    ];

    window.onload = function() { checkSession(); };

    // --- KADEMELİ FİLTRELEME ---
    function updateTeamSelect() {
        const leagueSelect = document.getElementById("tLeague");
        const teamSelect = document.getElementById("tTeam");
        const selectedLeague = leagueSelect.value;

        teamSelect.innerHTML = '<option value="">Tüm Takımlar</option>';

        if (selectedLeague && teamsByLeague[selectedLeague]) {
            teamSelect.disabled = false;
            teamsByLeague[selectedLeague].forEach(team => {
                const option = document.createElement("option");
                option.value = team;
                option.text = team;
                teamSelect.appendChild(option);
            });
        } else {
            teamSelect.innerHTML = '<option value="">Önce Lig Seçiniz</option>';
            teamSelect.disabled = true;
        }
        applyFilters(); 
    }

    // --- OYUNCU ARAMA ---
    function applyFilters() {
        const nameVal = document.getElementById('tName').value.toLowerCase();
        const nationVal = document.getElementById('tNation').value.toLowerCase();
        const leagueVal = document.getElementById('tLeague').value;
        const teamVal = document.getElementById('tTeam').value;
        const posVal = document.getElementById('tPos').value;
        
        const filtered = playersDB.filter(p => {
            return p.name.toLowerCase().includes(nameVal) &&
                   p.nation.toLowerCase().includes(nationVal) &&
                   (leagueVal === "" || p.league === leagueVal) &&
                   (teamVal === "" || p.team === teamVal) &&
                   (posVal === "" || p.pos === posVal);
        });
        
        renderPlayers(filtered);
        document.getElementById('filterMsg').innerText = `${filtered.length} oyuncu listelendi.`;
    }

    function renderPlayers(list) {
        const grid = document.getElementById('transferGrid');
        grid.innerHTML = "";

        list.forEach(p => {
            // Durum Rozeti (İkonlu)
            let statusBadge = `<div class="status-badge st-free"><i class="fas fa-check"></i> Teklife Açık</div>`;
            let btnState = "";
            let btnAction = `submitOffer(${p.id})`;

            if(p.status === 'pending') {
                statusBadge = `<div class="status-badge st-pending"><i class="fas fa-clock"></i> Bekleniyor</div>`;
                btnState = "btn-disabled";
                btnAction = "";
            }

            const isWatched = watchlist.includes(p.id);
            const watchClass = isWatched ? 'active' : '';
            const borderClass = isWatched ? 'watched' : '';

            grid.innerHTML += `
            <div class="player-card ${borderClass}">
                <div class="card-header">
                    <div class="rating-circle">${p.rating}</div>
                    <div class="player-info">
                        <h3>${p.name}</h3>
                        <span><i class="fas fa-shield-alt"></i> ${p.team}</span>
                        <span><i class="fas fa-flag"></i> ${p.nation}</span>
                    </div>
                    <button class="fav-btn ${watchClass}" onclick="toggleWatch(${p.id}, this)">
                        <i class="fas fa-star"></i>
                    </button>
                </div>
                
                ${statusBadge}

                <div class="card-stats">
                    <div class="stat-item"><span>Mevki</span> <strong>${p.pos}</strong></div>
                    <div class="stat-item"><span>Değer</span> <strong>${(p.val/1000000).toFixed(1)}M €</strong></div>
                </div>

                <div class="card-actions">
                    <button class="btn-offer ${btnState}" onclick="${btnAction}">
                        <i class="fas fa-paper-plane"></i> Teklif Yap
                    </button>
                </div>
            </div>`;
        });
    }

    // --- TAKİP LİSTESİ ---
    function toggleWatch(id, btn) {
        if(watchlist.includes(id)) {
            watchlist = watchlist.filter(pid => pid !== id);
            btn.classList.remove('active');
            btn.closest('.player-card').classList.remove('watched');
        } else {
            watchlist.push(id);
            btn.classList.add('active');
            btn.closest('.player-card').classList.add('watched');
        }
        if(document.getElementById('watchlist').classList.contains('active')) renderWatchList();
    }

    function renderWatchList() {
        const grid = document.getElementById('watchlistGrid');
        grid.innerHTML = "";
        const myPlayers = playersDB.filter(p => watchlist.includes(p.id));
        if(myPlayers.length === 0) { grid.innerHTML = "<p>Boş.</p>"; return; }
        
        // Aynı kart yapısını kullanıyoruz ama HTML'i manuel basıyoruz hızlıca
        myPlayers.forEach(p => {
            grid.innerHTML += `
            <div class="player-card watched">
                 <div class="card-header">
                    <div class="rating-circle">${p.rating}</div>
                    <div class="player-info">
                        <h3>${p.name}</h3>
                        <span>${p.team}</span>
                    </div>
                    <button class="fav-btn active" onclick="toggleWatch(${p.id}, this)"><i class="fas fa-star"></i></button>
                </div>
                <div class="card-actions">
                    <button class="btn-offer" onclick="submitOffer(${p.id})">TEKLİF YAP</button>
                </div>
            </div>`;
        });
    }

    // --- GİRİŞ & SİSTEM ---
    function openPassModal(name, code, rep, pass) {
        pendingLogin = { name, code, rep, pass };
        document.getElementById('passwordModal').style.display = 'flex';
        setTimeout(()=>document.getElementById('passInput').focus(),100);
    }
    function closePassModal() { document.getElementById('passwordModal').style.display = 'none'; }
    function checkPassword() {
        if(document.getElementById('passInput').value === pendingLogin.pass) {
            currentUser = pendingLogin;
            localStorage.setItem('activeUser_v91', JSON.stringify(currentUser));
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('headerTeamName').innerText = currentUser.name;
            document.getElementById('headerAvatar').innerText = currentUser.code;
            document.getElementById('headerRep').innerText = currentUser.rep;
            document.getElementById('adminPanel').style.display = 'flex';
            document.getElementById('passwordModal').style.display = 'none';
            applyFilters();
        } else {
            document.getElementById('passError').style.display = 'block';
        }
    }
    function checkSession() {
        const stored = localStorage.getItem('activeUser_v91');
        if(stored) {
            pendingLogin = JSON.parse(stored);
            document.getElementById('passInput').value = pendingLogin.pass; 
            checkPassword();
        }
    }
    function logout() { localStorage.removeItem('activeUser_v91'); location.reload(); }

    function switchTab(t) {
        document.querySelectorAll('.section-container').forEach(e => e.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+t).classList.add('active');
        if(t==='watchlist') renderWatchList();
    }

    // --- SİMÜLASYON ---
    function submitOffer(id) {
        if(!currentUser) return;
        const p = playersDB.find(x => x.id === id);
        const amount = prompt("Teklif (€):", p.val);
        if(!amount) return;
        
        p.status = 'pending';
        actionQueue.push({ pId: p.id, from: currentUser.name, amount: amount });
        document.getElementById('queueCount').innerText = actionQueue.length;
        applyFilters();
    }

    function simulateWeek() {
        if(actionQueue.length === 0) return;
        actionQueue.forEach(a => {
            const p = playersDB.find(x => x.id === a.pId);
            p.status = 'free'; // Basitçe resetliyoruz
            document.getElementById('simLog').innerHTML += `<div class="log-entry" style="color:#2cb67d">> ${p.name}: ${a.from} teklifi işlendi.</div>`;
        });
        actionQueue = [];
        document.getElementById('queueCount').innerText = 0;
        applyFilters();
    }

</script>
</body>
</html>
