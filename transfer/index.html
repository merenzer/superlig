<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout & Transfer Hub Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* DARK MODE RENK PALETİ (v2'den) */
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2c2c2c;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            
            --accent-blue: #3da9fc;   /* Transfer Mavisi */
            --accent-green: #2cb67d;  /* Onay Yeşili */
            --accent-gold: #ffd700;   /* Scout Sarısı */
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
        }

        /* HEADER & CÜZDAN */
        header {
            background-color: var(--bg-card);
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: var(--text-main); 
            letter-spacing: 1px;
        }
        .brand i { color: var(--accent-blue); }

        .wallet {
            background: rgba(44, 182, 125, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 10px rgba(44, 182, 125, 0.2);
        }

        /* TAB MENÜ (Sekmeler) */
        .nav-tabs {
            display: flex;
            justify-content: center;
            background: #0d0d0d;
            padding: 15px 0;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            border: 2px solid transparent;
            color: var(--text-muted);
            font-size: 1rem;
            padding: 10px 25px;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.3s;
            font-weight: 600;
        }

        .tab-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        
        .tab-btn.active { 
            color: #121212;
            background: var(--accent-blue);
            box-shadow: 0 0 15px rgba(61, 169, 252, 0.4);
        }
        
        /* Scout sekmesi aktifse rengi sarı yap */
        .tab-btn.scout-active {
            background: var(--accent-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* İÇERİK ALANLARI */
        .section-container {
            display: none; 
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            animation: fadeIn 0.5s;
        }
        .section-container.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ARAMA KUTUSU TASARIMI */
        .search-area {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .search-input {
            padding: 15px;
            width: 60%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 10px rgba(61, 169, 252, 0.2); }

        .btn-action {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }
        .btn-blue { background: var(--accent-blue); color: #000; }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(61, 169, 252, 0.3); }

        /* GRID ve KART TASARIMI (v2 Premium Geri Döndü!) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .player-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* Kartın üstündeki renkli çizgi */
        .player-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
        }

        .player-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-color: #444;
        }

        .card-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* O IŞIKLI REYTİNG ÇEMBERİ GERİ GELDİ */
        .rating-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2c3e50, #000);
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin-right: 15px;
            box-shadow: 0 0 15px rgba(44, 182, 125, 0.3); /* Neon Parlama */
        }

        .player-info h3 { margin: 0; font-size: 1.2rem; color: var(--text-main); }
        .player-info span { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .card-stats {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            font-size: 0.9rem;
        }
        .stat-item span { color: var(--text-muted); display: block; font-size: 0.8rem; }
        .stat-item strong { color: var(--text-main); font-size: 1.1rem; }

        .card-actions { padding: 20px; margin-top: auto; }

        /* BUTONLAR */
        .btn-offer {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--accent-green);
            border: 2px solid var(--accent-green);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-offer:hover { background: var(--accent-green); color: #000; box-shadow: 0 0 15px rgba(44, 182, 125, 0.4); }

        /* GİZLİ OYUNCU (SCOUT) STİLİ */
        .player-card.hidden .rating-circle {
            border-color: var(--text-muted);
            color: var(--text-muted);
            box-shadow: none;
        }
        .player-card.hidden .player-info h3 {
            filter: blur(5px); /* İsim Buzlu */
            user-select: none;
        }
        .player-card.hidden::before {
            background: var(--accent-gold); /* Gizliler sarı çizgili */
        }
        
        .btn-scout {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .btn-scout:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

    </style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-bolt"></i> FUTBOL SİMÜLASYON</div>
    <div class="wallet">
        <i class="fas fa-wallet"></i> <span id="teamBudget">--</span> €
    </div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-transfer" onclick="switchTab('transfer')">Transfer Merkezi</button>
    <button class="tab-btn" id="btn-scout" onclick="switchTab('scout')">Scout Ofisi</button>
</div>

<div id="transfer" class="section-container active">
    <div class="search-area">
        <h2><i class="fas fa-search-location" style="color:var(--accent-blue)"></i> Transfer Pazarı</h2>
        <p style="color:var(--text-muted)">Bilinen yıldızları aratın ve teklif yapın.</p>
        <br>
        <input type="text" id="transferSearch" class="search-input" placeholder="Oyuncu adı (Örn: Osimhen)...">
        <button class="btn-action btn-blue" onclick="searchTransfer()">ARA</button>
        <p id="transferMsg" style="margin-top:15px; color:var(--text-muted)"></p>
    </div>
    <div class="grid" id="transferGrid"></div>
</div>

<div id="scout" class="section-container">
    <div class="search-area" style="border-color: #554400;">
        <h2 style="color:var(--accent-gold)"><i class="fas fa-eye-slash"></i> Gizli Yetenekler</h2>
        <p style="color:var(--text-muted)">Bu oyuncular veritabanında gizlidir. Özelliklerini görmek için rapor alın.</p>
        <div style="margin-top:10px; font-weight:bold; color:var(--accent-gold)">
            RAPOR BEDELİ: 500.000 €
        </div>
    </div>
    <div class="grid" id="scoutGrid"></div>
</div>

<script>
    // --- KONFIGURASYON ---
    let budget = 15000000; 
    const scoutCost = 500000;
    
    // ÖRNEK VERİTABANI
    const playersDB = [
        // PUBLIC: Herkese açık oyuncular
        { id: 1, type: 'public', name: "Mauro Icardi", team: "Galatasaray", pos: "ST", rating: 83, age: 31, val: "20.000.000 €" },
        { id: 2, type: 'public', name: "Edin Dzeko", team: "Fenerbahçe", pos: "ST", rating: 81, age: 37, val: "4.000.000 €" },
        { id: 3, type: 'public', name: "Ciro Immobile", team: "Beşiktaş", pos: "ST", rating: 82, age: 34, val: "5.000.000 €" },

        // HIDDEN: Scout gerektirenler
        { id: 101, type: 'hidden', isRevealed: false, name: "Wonderkid A", realName: "Arda Güler", region: "İspanya", pos: "CAM", rating: 78, age: 19, val: "45.000.000 €" },
        { id: 102, type: 'hidden', isRevealed: false, name: "Samba Golcüsü", realName: "Vitor Roque", region: "İspanya", pos: "ST", rating: 76, age: 19, val: "30.000.000 €" },
        { id: 103, type: 'hidden', isRevealed: false, name: "Duvar", realName: "Kim Min-Jae", region: "Almanya", pos: "CB", rating: 84, age: 27, val: "55.000.000 €" }
    ];

    // BAŞLANGIÇ
    updateBudget();
    renderScoutList(); 

    // --- FONKSİYONLAR ---

    function switchTab(tabName) {
        // İçerikleri gizle/göster
        document.querySelectorAll('.section-container').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');

        // Buton stillerini ayarla
        document.querySelectorAll('.tab-btn').forEach(el => {
            el.classList.remove('active');
            el.classList.remove('scout-active');
        });
        
        const btn = document.getElementById('btn-' + tabName);
        if(tabName === 'scout') {
            btn.classList.add('active'); // CSS'de scout-active stilini de kullanabiliriz
            btn.classList.add('scout-active');
        } else {
            btn.classList.add('active');
        }
    }

    function updateBudget() {
        document.getElementById('teamBudget').innerText = budget.toLocaleString();
    }

    // TRANSFER ARAMA
    function searchTransfer() {
        const query = document.getElementById('transferSearch').value.toLowerCase();
        const grid = document.getElementById('transferGrid');
        const msg = document.getElementById('transferMsg');
        
        grid.innerHTML = "";
        
        if(query.length < 2) {
            msg.innerText = "Lütfen en az 2 harf giriniz.";
            return;
        }

        const results = playersDB.filter(p => p.type === 'public' && p.name.toLowerCase().includes(query));

        if(results.length === 0) {
            msg.innerHTML = '<i class="fas fa-times-circle"></i> Oyuncu bulunamadı.';
            return;
        }

        msg.innerText = `${results.length} oyuncu listelendi.`;

        results.forEach(p => {
            // v2 PREMIUM KART TASARIMI
            const card = `
                <div class="player-card">
                    <div class="card-header">
                        <div class="rating-circle">${p.rating}</div>
                        <div class="player-info">
                            <h3>${p.name}</h3>
                            <span><i class="fas fa-tshirt"></i> ${p.pos} &bull; ${p.team}</span>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat-item"><span>YAŞ</span> <strong>${p.age}</strong></div>
                        <div class="stat-item"><span>DEĞER</span> <strong>${p.val}</strong></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-offer" onclick="alert('Teklif Modalı Açılacak: ${p.name}')">
                            <i class="fas fa-paper-plane"></i> TEKLİF YAP
                        </button>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    // SCOUT LİSTELEME
    function renderScoutList() {
        const grid = document.getElementById('scoutGrid');
        grid.innerHTML = "";

        const hiddenPlayers = playersDB.filter(p => p.type === 'hidden');

        hiddenPlayers.forEach(p => {
            if(p.isRevealed) {
                // AÇILMIŞ OYUNCU (Normal Kart)
                const card = `
                    <div class="player-card" style="border-color: var(--accent-gold);">
                        <div class="card-header">
                            <div class="rating-circle" style="border-color:var(--accent-gold); color:var(--accent-gold); box-shadow:0 0 15px rgba(255,215,0,0.3)">${p.rating}</div>
                            <div class="player-info">
                                <h3 style="color:var(--accent-gold)">${p.realName}</h3>
                                <span><i class="fas fa-globe"></i> ${p.region} &bull; ${p.pos}</span>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="stat-item"><span>YAŞ</span> <strong>${p.age}</strong></div>
                            <div class="stat-item"><span>DEĞER</span> <strong>${p.val}</strong></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-offer" style="border-color:var(--accent-gold); color:var(--accent-gold)" onclick="alert('Teklif: ${p.realName}')">
                                <i class="fas fa-check"></i> TEKLİF YAP
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            } else {
                // GİZLİ OYUNCU (Blur Efektli)
                const card = `
                    <div class="player-card hidden">
                        <div class="card-header">
                            <div class="rating-circle">?</div>
                            <div class="player-info">
                                <h3>GİZLİ OYUNCU</h3>
                                <span><i class="fas fa-map-marker-alt"></i> ${p.region} &bull; ${p.pos}</span>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="stat-item"><span>YAŞ</span> <strong>${p.age}</strong></div>
                            <div class="stat-item"><span>DURUM</span> <strong>Gözlemlenmedi</strong></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-offer btn-scout" onclick="revealPlayer(${p.id})">
                                <i class="fas fa-search-dollar"></i> RAPOR AL (-500k)
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            }
        });
    }

    function revealPlayer(id) {
        if(budget < scoutCost) {
            alert("Bakiye yetersiz! Maç kazanarak para biriktir.");
            return;
        }

        const player = playersDB.find(p => p.id === id);
        
        if(confirm(`${player.region} bölgesindeki oyuncu için Scout ekibi 500.000 € istiyor. Onaylıyor musun?`)) {
            budget -= scoutCost;
            updateBudget();
            player.isRevealed = true;
            renderScoutList();
            
            // Basit bir kutlama efekti (opsiyonel)
            alert(`✅ RAPOR GELDİ!\nOyuncu: ${player.realName} (${player.rating})\nDeğer: ${player.val}`);
        }
    }
</script>

</body>
</html>
