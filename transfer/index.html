<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v16 | FM Mode</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.6.6/css/flag-icons.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #1e1e1e; --card: #252525; --accent: #00ff88; --text: #eee; --gold: #ffd700;
            --stat-high: #00ff88; --stat-med: #e9c46a; --stat-low: #888;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        button { cursor: pointer; font-family: inherit; }

        /* HEADER & CÜZDAN */
        header { padding: 0 20px; height: 80px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #161616; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
        .user-profile { text-align: right; }
        .wallet-box { color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-top: 4px; }

        /* GİRİŞ EKRANI */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .team-btn { padding: 15px 30px; margin: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; border-radius: 8px; font-size: 1.1rem; transition: 0.3s; }
        .team-btn:hover { border-color: var(--accent); background: #222; transform: scale(1.05); }

        /* SEKMELER */
        .tabs { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #111; }
        .tab { padding: 10px 20px; background: transparent; border: 1px solid #333; color: #888; border-radius: 20px; font-weight: bold; }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* KART TASARIMI */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        
        .card-head { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; position: relative; }
        
        /* BAYRAK BALONCUĞU */
        .flag-bubble { 
            width: 50px; height: 50px; 
            border-radius: 50%; 
            overflow: hidden; /* Bayrağı yuvarlak keser */
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #444;
            background: #000;
        }
        /* Flag-icons kütüphanesi için ayar */
        .flag-bubble .fi { font-size: 60px; /* Baloncuğu doldursun diye büyük */ margin-top: -5px; }

        .card-body { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; color: #aaa; }
        .card-body b { color: #fff; display: block; font-size: 0.95rem; }

        /* --- FM STİLİ DETAY MODALI --- */
        #profileModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1b1b1b; width: 95%; max-width: 700px; border-radius: 12px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
        
        /* Modal Üstü */
        .modal-header { background: #111; padding: 20px; display: flex; align-items: center; gap: 20px; border-bottom: 2px solid var(--accent); }
        .modal-flag { font-size: 3rem; border-radius: 4px; }
        .player-title h2 { margin: 0; color: #fff; font-size: 1.8rem; }
        .player-title span { color: #888; font-size: 1rem; }
        .close-btn { margin-left: auto; font-size: 1.5rem; cursor: pointer; color: #666; }

        /* Modal Ortası - FM Düzeni */
        .fm-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; overflow-y: auto; }
        
        .fm-col { background: #222; padding: 15px; border-radius: 8px; }
        .fm-col h4 { margin: 0 0 10px 0; color: var(--accent); text-transform: uppercase; font-size: 0.85rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.9rem; border-bottom: 1px solid #2a2a2a; padding-bottom: 2px; }
        .stat-name { color: #bbb; }
        .stat-val { font-weight: bold; color: #fff; width: 30px; text-align: center; background: #333; border-radius: 4px; }
        
        /* Renklendirme */
        .val-high { color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .val-med { color: #e9c46a; background: rgba(233, 196, 106, 0.1); }
        .val-low { color: #777; }

        .blur-stat .stat-val { color: transparent; text-shadow: 0 0 5px #fff; background: transparent; }

        .modal-actions { padding: 20px; display: flex; gap: 10px; background: #111; border-top: 1px solid #333; }
        .btn-full { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-buy { background: var(--accent); color: #000; }
        .btn-scout { background: var(--gold); color: #000; }
        .btn-sell { background: #ff4757; color: #fff; }

        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #000; padding: 15px 30px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box" style="text-align: center;">
        <h1 style="color:#fff;">MENAJER GİRİŞİ</h1>
        <button class="team-btn" onclick="login('Galatasaray')">Galatasaray</button>
        <button class="team-btn" onclick="login('Fenerbahçe')">Fenerbahçe</button>
        <button class="team-btn" onclick="login('Beşiktaş')">Beşiktaş</button>
        <button class="team-btn" onclick="login('Trabzonspor')">Trabzonspor</button>
    </div>
</div>

<div id="profileModal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="mFlag" class="fi fi-xx modal-flag"></span>
            <div class="player-title">
                <h2 id="mName">Oyuncu Adı</h2>
                <span id="mInfo">Takım • Mevki • Yaş</span>
            </div>
            <i class="fas fa-times close-btn" onclick="closeModal()"></i>
        </div>

        <div class="fm-grid">
            <div class="fm-col">
                <h4>Teknik</h4>
                <div id="col-technical"></div>
            </div>
            <div class="fm-col">
                <h4>Zihinsel</h4>
                <div id="col-mental"></div>
            </div>
            <div class="fm-col">
                <h4>Fiziksel</h4>
                <div id="col-physical"></div>
            </div>
        </div>

        <div class="modal-actions" id="modalActions"></div>
    </div>
</div>

<header>
    <div class="brand">TRANSFER V16</div>
    <div class="user-profile">
        <div id="userBadge" style="color:#888; font-size:0.8rem;">--</div>
        <div id="walletDisplay" class="wallet-box">0.0M €</div>
    </div>
</header>

<div class="tabs">
    <button class="tab active" onclick="switchTab('market')">Transfer Pazarı</button>
    <button class="tab" onclick="switchTab('squad')">Kadrom</button>
</div>

<div class="container">
    <input type="text" id="searchInput" placeholder="Oyuncu Ara..." style="width:100%; padding:15px; background:#222; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:20px;" onkeyup="search()">
    <div class="grid" id="grid"></div>
</div>

<div id="toast">İşlem Başarılı!</div>

<script>
    // Codespaces Linkini Buraya Yapıştır (Sonunda / olmasın)
    const API_URL = "https://probable-space-barnacle-5gjp5jp779qxfvjrv-3000.app.github.dev";

    let myTeam = "";
    let myBudget = 0;
    let allPlayers = [];
    let currentTab = 'market';

    async function login(team) {
        myTeam = team;
        document.getElementById('userBadge').innerText = team + " Menajeri";
        document.getElementById('loginOverlay').style.display = 'none';
        await updateBudget();
        loadData();
    }

    async function updateBudget() {
        try {
            const res = await fetch(`${API_URL}/club/${myTeam}`);
            const data = await res.json();
            myBudget = data.budget || 0;
            document.getElementById('walletDisplay').innerText = (myBudget / 1000000).toFixed(1) + "M €";
        } catch(e) {}
    }

    async function loadData() {
        try {
            const res = await fetch(`${API_URL}/players`);
            allPlayers = await res.json();
            render();
        } catch (e) { alert("Sunucu Kapalı!"); }
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const term = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allPlayers.filter(p => {
            const nameMatch = p.name.toLowerCase().includes(term);
            const isMine = p.team === myTeam;
            if (currentTab === 'squad') return isMine && nameMatch; 
            else return !isMine && nameMatch; 
        });

        filtered.slice(0, 100).forEach(p => {
            // flagCode sunucudan 'tr', 'de', 'cm' olarak geliyor
            grid.innerHTML += `
            <div class="card" onclick="openProfile(${p.id})">
                <div class="card-head">
                    <div class="flag-bubble">
                        <span class="fi fi-${p.flagCode}"></span>
                    </div>
                    <div>
                        <h3 style="margin:0">${p.name}</h3>
                        <small style="color:#888">${p.pos} • ${p.nation}</small>
                    </div>
                </div>
                <div class="card-body">
                    <div>TAKIM <b>${p.team}</b></div>
                    <div>YAŞ <b>${p.age}</b></div>
                    <div style="grid-column: span 2; text-align:right; color:var(--accent)">${p.valStr}</div>
                </div>
            </div>`;
        });
    }

    function openProfile(id) {
        const p = allPlayers.find(x => x.id === id);
        if (!p) return;

        // Başlık Bilgileri
        document.getElementById('mName').innerText = p.name;
        document.getElementById('mInfo').innerText = `${p.team} • ${p.pos} • ${p.age} Yaş`;
        document.getElementById('mFlag').className = `fi fi-${p.flagCode} modal-flag`;

        // --- FM STAT MANTIĞI ---
        const raw = p.raw; // Tüm veritabanı satırı burada!
        
        // Hangi sütun hangi kategoriye gidecek?
        // (Veritabanındaki sütun adlarını buraya eşliyoruz)
        const techKeys = ["Bitiricilik", "Pas", "Orta", "Dribbling", "Teknik", "TopKapma", "Kafa", "Sut", "Penaltı", "Frikik", "Korner"];
        const mentKeys = ["Vizyon", "Agresiflik", "Pozisyon", "Karar", "Liderlik", "Konsantrasyon", "Sogukkanlilik"];
        const physKeys = ["Hiz", "Hizlanma", "Guc", "Dayaniklilik", "Denge", "Ceviklik", "Zıplama"];

        // Statları Listeye Dök
        const renderStats = (keys, containerId) => {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            let foundAny = false;

            keys.forEach(key => {
                if (raw[key] !== undefined) { // Eğer veritabanında bu sütun varsa
                    const val = raw[key];
                    let colorClass = "val-low";
                    if(val >= 15) colorClass = "val-high"; // 15-20 arası yeşil
                    else if(val >= 10) colorClass = "val-med"; // 10-14 arası sarı

                    // Benim oyuncum değilse blurla
                    const blurClass = (p.team !== myTeam) ? "blur-stat" : "";

                    container.innerHTML += `
                    <div class="stat-row ${blurClass}">
                        <span class="stat-name">${key}</span>
                        <span class="stat-val ${colorClass}">${val}</span>
                    </div>`;
                    foundAny = true;
                }
            });
            if(!foundAny) container.innerHTML = "<small style='color:#555'>Veri yok</small>";
        };

        renderStats(techKeys, 'col-technical');
        renderStats(mentKeys, 'col-mental');
        renderStats(physKeys, 'col-physical');

        // Butonlar
        const actionsDiv = document.getElementById('modalActions');
        actionsDiv.innerHTML = "";
        if (p.team === myTeam) {
            actionsDiv.innerHTML = `<button class="btn-full btn-sell" onclick="sellPlayer(${p.id})">SATIŞA KOY</button>`;
        } else {
            actionsDiv.innerHTML = `
                <button class="btn-full btn-scout" onclick="revealStats()">GÖZLEMCİ (${(p.val/2000000).toFixed(1)}M €)</button>
                <button class="btn-full btn-buy" onclick="buyPlayer(${p.id}, '${p.name}', ${p.val})">SATIN AL (${p.valStr})</button>
            `;
        }

        document.getElementById('profileModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('profileModal').style.display = 'none'; }
    
    function revealStats() {
        const stats = document.querySelectorAll('.blur-stat');
        if(stats.length === 0) return alert("Zaten açık.");
        alert("🔍 Gözlemci raporu bekleniyor...");
        setTimeout(() => {
            stats.forEach(el => el.classList.remove('blur-stat'));
            alert("✅ Rapor Geldi!");
        }, 800);
    }

    async function buyPlayer(id, name, priceVal) {
        if (priceVal > myBudget) {
            alert(`❌ BAKİYE YETERSİZ!\nGereken: ${(priceVal/1000000).toFixed(1)}M €`);
            return;
        }
        if(!confirm(`${name} alınsın mı?`)) return;
        
        const res = await fetch(`${API_URL}/buy`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ playerId: id, teamName: myTeam, price: priceVal }) 
        });
        const result = await res.json();
        if(result.success) {
            closeModal();
            showToast("Transfer Başarılı!");
            updateBudget();
            loadData();
        } else alert(result.msg);
    }

    async function sellPlayer(id) {
        if(!confirm("Oyuncu gönderilsin mi?")) return;
        await fetch(`${API_URL}/sell`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ playerId: id })
        });
        closeModal();
        showToast("Satıldı.");
        loadData();
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }
    function search() { render(); }
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
</script>
</body>
</html>
