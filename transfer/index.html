<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v11 | Radar Scout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #050505; --bg-card: #121212; --bg-input: #1f1f1f;
            --text-main: #e0e0e0; --text-muted: #888;
            --radar-color: #2cb67d; /* Radar Yeşili */
            --accent-blue: #3da9fc; --accent-gold: #ffd700; --danger: #ef476f;
            --border: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 300px; overflow-x: hidden; }
        button, select, input { font-family: inherit; outline: none; }

        /* HEADER & TABS */
        header { background: var(--bg-card); padding: 0 2rem; height: 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 30px rgba(0,0,0,0.5); }
        .brand { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .user-profile { display: flex; align-items: center; gap: 15px; text-align: right; }
        .user-avatar { width: 40px; height: 40px; background: var(--radar-color); color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        .nav-tabs { display: flex; justify-content: center; background: #0a0a0a; padding: 15px 0; gap: 10px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: transparent; border: 1px solid #333; color: var(--text-muted); padding: 10px 30px; cursor: pointer; border-radius: 30px; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { background: var(--radar-color); color: #000; border-color: var(--radar-color); box-shadow: 0 0 15px rgba(44, 182, 125, 0.3); }

        .page-section { display: none; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- RADAR ARAYÜZÜ (YENİ) --- */
        .radar-container {
            position: relative; width: 600px; height: 600px; margin: 0 auto;
            border-radius: 50%; border: 2px solid rgba(44, 182, 125, 0.3);
            background: radial-gradient(circle, rgba(44,182,125,0.05) 0%, rgba(0,0,0,0) 70%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(44, 182, 125, 0.1);
            transition: all 0.5s ease; /* Blur geçişi için */
        }
        
        /* İç Halkalar */
        .radar-ring { position: absolute; border: 1px dashed rgba(44, 182, 125, 0.2); border-radius: 50%; }
        .ring-1 { width: 200px; height: 200px; }
        .ring-2 { width: 400px; height: 400px; }
        
        /* Tarama Çizgisi (Scanner) */
        .radar-scan {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(44, 182, 125, 0.1) 40%, rgba(44, 182, 125, 0.4) 50%, transparent 50%);
            animation: radarSpin 4s linear infinite; pointer-events: none; z-index: 1;
        }
        @keyframes radarSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Kıtalar (Noktalar) */
        .radar-blip {
            position: absolute; width: 100px; height: 100px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; z-index: 5;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Konumlandırma (Merkezden uzaklık) */
        .pos-eu { top: 15%; left: 50%; transform: translateX(-50%); } /* Avrupa (Kuzey) */
        .pos-sa { bottom: 20%; left: 15%; } /* G.Amerika (Güney Batı) */
        .pos-af { bottom: 20%; right: 15%; } /* Afrika (Güney Doğu) */
        
        /* Blip Görünümü */
        .blip-dot {
            width: 20px; height: 20px; background: var(--bg-body); border: 2px solid var(--accent-gold);
            border-radius: 50%; margin-bottom: 5px; box-shadow: 0 0 10px var(--accent-gold);
            position: relative; transition: 0.3s;
        }
        .blip-dot::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:6px; height:6px; background:var(--accent-gold); border-radius:50%; }
        
        .blip-label { font-size: 0.9rem; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; transition: 0.3s; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; }

        /* Hover & Active Effects */
        .radar-blip:hover { transform: scale(1.2) !important; z-index: 10; } /* !important to override specific pos transforms if needed, but handled by specific classes usually. Here simple scale works if we manage layout right. */
        /* Düzeltme: Hoverda transformu bozmamak için scale'i child elemente verelim veya transformu koruyalım. */
        .pos-eu:hover { transform: translateX(-50%) scale(1.2); }
        .pos-sa:hover, .pos-af:hover { transform: scale(1.2); }

        .radar-blip:hover .blip-dot { background: var(--accent-gold); box-shadow: 0 0 20px var(--accent-gold); }
        .radar-blip:hover .blip-label { color: #fff; text-shadow: 0 0 10px var(--accent-gold); }

        /* SEÇİM ANI (Blur Efekti) */
        .radar-container.blurred {
            filter: blur(5px) brightness(0.5); pointer-events: none; transform: scale(0.9);
        }

        /* SCOUT PANELİ (Seçim Sonrası Açılan) */
        .scout-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(18, 18, 18, 0.95); border: 1px solid var(--radar-color);
            padding: 40px; border-radius: 20px; width: 400px; text-align: center;
            opacity: 0; pointer-events: none; transition: all 0.4s ease;
            box-shadow: 0 0 50px rgba(44, 182, 125, 0.2); z-index: 20; backdrop-filter: blur(10px);
        }
        .scout-overlay.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }

        .form-group { margin-bottom: 20px; text-align: left; }
        .filter-select, .search-input { width: 100%; height: 45px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; padding: 0 15px; }
        .btn-radar { width: 100%; height: 50px; background: var(--radar-color); color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .btn-radar:hover { box-shadow: 0 0 20px var(--radar-color); }

        /* --- PLAYER CARDS (PREMIUM) --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .player-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; transition: 0.3s; }
        .player-card:hover { transform: translateY(-5px); border-color: #555; }
        .player-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:4px; background: linear-gradient(90deg, var(--accent-blue), var(--radar-color)); }
        
        .card-header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .rating-circle { width: 50px; height: 50px; background: #1a1a1a; border: 2px solid var(--radar-color); color: var(--radar-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; box-shadow: 0 0 10px rgba(44,182,125,0.2); }
        .player-info h3 { margin: 0; color: #fff; font-size: 1.1rem; }
        .player-info span { font-size: 0.8rem; color: #888; display: block; margin-top: 3px; }
        
        .card-actions { padding: 20px; }
        .btn-offer { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--radar-color); color: var(--radar-color); border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-offer:hover { background: var(--radar-color); color: #000; }

        /* Login & Admin Styles (Standart) */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid #333; text-align: center; width: 90%; max-width: 800px; }
        .team-btn { background: #222; border: 1px solid #333; color: #ccc; padding: 20px; border-radius: 10px; cursor: pointer; margin: 5px; display: inline-block; width: 120px; }
        .team-btn:hover { border-color: var(--radar-color); color: #fff; }
        
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 250px; background: #080808; border-top: 2px solid var(--danger); z-index: 8000; display: none; padding: 20px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color:#fff; letter-spacing:3px; margin-bottom:10px;">RADAR SCOUT</h1>
        <p style="color:#666; margin-bottom:30px;">Veri Tabanı Bağlantısı İçin Kimlik Seçin</p>
        <div>
            <div class="team-btn" onclick="login('Galatasaray', 'GS', 'manager')"><i class="fas fa-shield-alt"></i><br>GS</div>
            <div class="team-btn" onclick="login('Fenerbahçe', 'FB', 'manager')"><i class="fas fa-shield-alt"></i><br>FB</div>
            <div class="team-btn" onclick="login('Beşiktaş', 'BJK', 'manager')"><i class="fas fa-shield-alt"></i><br>BJK</div>
            <div class="team-btn" onclick="login('TFF', 'ADMIN', 'admin')" style="border-color:var(--danger)"><i class="fas fa-user-lock"></i><br>ADMIN</div>
        </div>
    </div>
</div>

<header>
    <div class="brand"><i class="fas fa-satellite-dish" style="color:var(--radar-color)"></i> TRANSFER v11</div>
    <div class="user-profile">
        <div><h4 id="headUser" style="margin:0; font-size:0.9rem">--</h4></div>
        <div class="user-avatar" id="headCode">?</div>
        <i class="fas fa-power-off" onclick="location.reload()" style="color:var(--danger); cursor:pointer; margin-left:15px;"></i>
    </div>
</header>

<div class="nav-tabs" id="managerTabs">
    <button class="tab-btn active" id="btn-transfer" onclick="switchPage('section-transfer')">Transfer</button>
    <button class="tab-btn" id="btn-scout" onclick="switchPage('section-scout')">Scout Radar</button>
    <button class="tab-btn" id="btn-watchlist" onclick="switchPage('section-watchlist')">Takip</button>
</div>

<div id="section-transfer" class="page-section active">
    <div style="background:var(--bg-card); padding:20px; border-radius:12px; margin-bottom:20px; display:flex; gap:10px;">
        <input type="text" id="tName" class="search-input" placeholder="Oyuncu Adı..." style="flex:2">
        <button class="btn-radar" onclick="applyFilters()" style="flex:1; max-width:150px;">ARA</button>
    </div>
    <div class="grid" id="transferGrid"></div>
</div>

<div id="section-scout" class="page-section">
    <div style="position:relative; min-height: 650px;">
        
        <h2 style="text-align:center; color:var(--text-muted); margin-bottom:40px; font-weight:400;">
            <i class="fas fa-crosshairs" style="color:var(--radar-color)"></i> HEDEF BÖLGE SEÇİN
        </h2>

        <div class="radar-container" id="radarSystem">
            <div class="radar-scan"></div> <div class="radar-ring ring-1"></div>
            <div class="radar-ring ring-2"></div>

            <div class="radar-blip pos-eu" onclick="selectRegion('Avrupa')">
                <div class="blip-dot"></div>
                <div class="blip-label">AVRUPA</div>
            </div>
            
            <div class="radar-blip pos-sa" onclick="selectRegion('Güney Amerika')">
                <div class="blip-dot"></div>
                <div class="blip-label">G. AMERİKA</div>
            </div>

            <div class="radar-blip pos-af" onclick="selectRegion('Afrika')">
                <div class="blip-dot"></div>
                <div class="blip-label">AFRİKA</div>
            </div>
        </div>

        <div class="scout-overlay" id="scoutPanel">
            <h2 style="color:var(--radar-color); margin-top:0;"><i class="fas fa-satellite"></i> HEDEF KİLİTLENDİ</h2>
            <p id="targetRegion" style="color:#fff; border-bottom:1px solid #333; padding-bottom:10px;">Bölge: --</p>
            
            <div class="form-group">
                <label style="color:#888; display:block; margin-bottom:5px;">Aranan Pozisyon</label>
                <select id="scoutPos" class="filter-select">
                    <option value="Any">Farketmez</option><option value="ST">Forvet</option><option value="LW">Kanat</option><option value="CB">Defans</option>
                </select>
            </div>
            
            <button class="btn-radar" onclick="launchScout()">TARAMAYI BAŞLAT</button>
            <button onclick="resetRadar()" style="background:transparent; border:none; color:#666; margin-top:15px; cursor:pointer;">İptal Et</button>
        </div>

        <div id="scoutResults" style="display:none; margin-top:30px;">
            <div style="border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:20px; color:var(--radar-color)">
                <i class="fas fa-list"></i> RAPOR SONUÇLARI
            </div>
            <div class="grid" id="scoutGrid"></div>
        </div>

    </div>
</div>

<div id="section-watchlist" class="page-section">
    <div class="grid" id="watchlistGrid"></div>
</div>

<div id="adminPanel">
    <h3 style="color:var(--danger)">TFF KONTROL MERKEZİ</h3>
    <div style="color:#888; margin-bottom:10px;">Bekleyen İşlem: <span id="qCount" style="color:#fff">0</span></div>
    <button class="btn-radar" style="background:var(--danger); color:#fff; width:200px;" onclick="simulate()">HAFTAYI İLERLET</button>
</div>

<script>
    let user = null, queue = [], watchlist = [];
    const players = [
        {id:1, type:'public', name:"Icardi", team:"GS", pos:"ST", rating:83, val:20, region:"Avrupa"},
        {id:2, type:'public', name:"Dzeko", team:"FB", pos:"ST", rating:81, val:4, region:"Avrupa"},
        // Hidden Gems
        {id:101, type:'hidden', region:'Afrika', name:"Gizli", rName:"Fofana", team:"Chelsea", pos:"ST", rating:76, val:12},
        {id:102, type:'hidden', region:'Güney Amerika', name:"Gizli", rName:"Endrick", team:"Palmeiras", pos:"ST", rating:75, val:30},
        {id:103, type:'hidden', region:'Avrupa', name:"Gizli", rName:"K. Yıldız", team:"Juve", pos:"LW", rating:76, val:25}
    ];

    // --- RADAR LOGIC ---
    function selectRegion(region) {
        // 1. Radarı bulanıklaştır
        document.getElementById('radarSystem').classList.add('blurred');
        // 2. Paneli aç
        const panel = document.getElementById('scoutPanel');
        panel.classList.add('active');
        document.getElementById('targetRegion').innerText = "Bölge: " + region;
        // 3. Veriyi sakla
        panel.setAttribute('data-region', region);
    }

    function resetRadar() {
        document.getElementById('radarSystem').classList.remove('blurred');
        document.getElementById('scoutPanel').classList.remove('active');
        document.getElementById('scoutResults').style.display = 'none';
    }

    function launchScout() {
        const region = document.getElementById('scoutPanel').getAttribute('data-region');
        
        // Animasyon hissi ver
        document.getElementById('scoutPanel').classList.remove('active');
        // Radar dönsün ama blur kalsın
        
        alert(`📡 Uydu bağlantısı kuruldu... ${region} taranıyor.`);
        
        setTimeout(() => {
            document.getElementById('radarSystem').classList.remove('blurred');
            const hits = players.filter(p => p.type === 'hidden' && p.region === region);
            renderScoutResults(hits);
        }, 1500);
    }

    function renderScoutResults(list) {
        document.getElementById('scoutResults').style.display = 'block';
        const grid = document.getElementById('scoutGrid');
        grid.innerHTML = "";
        
        if(list.length === 0) { grid.innerHTML = "<p>Oyuncu bulunamadı.</p>"; return; }

        list.forEach(p => {
            grid.innerHTML += `
            <div class="player-card" style="border-color:var(--accent-gold)">
                <div class="card-header">
                    <div class="rating-circle" style="border-color:#444; color:#444">?</div>
                    <div class="player-info">
                        <h3 style="filter:blur(5px)">GİZLİ</h3>
                        <span>${p.region}</span>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn-offer" onclick="alert('Oyuncu: ${p.rName}')" style="border-color:var(--accent-gold); color:var(--accent-gold)">
                        RAPORU AÇ (-500k)
                    </button>
                </div>
            </div>`;
        });
        // Scroll to results
        document.getElementById('scoutResults').scrollIntoView({behavior: 'smooth'});
    }

    // --- STANDART FONKSİYONLAR ---
    function login(name, code, role) {
        user = {name, code, role};
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('headUser').innerText = name;
        document.getElementById('headCode').innerText = code;
        
        if(role === 'admin') {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('managerTabs').style.display = 'none';
        } else {
            renderList(players.filter(p=>p.type==='public'), 'transferGrid');
        }
    }

    function switchPage(id) {
        document.querySelectorAll('.page-section').forEach(e => e.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(id.includes('transfer')) document.getElementById('btn-transfer').classList.add('active');
        if(id.includes('scout')) document.getElementById('btn-scout').classList.add('active');
        if(id.includes('watchlist')) { document.getElementById('btn-watchlist').classList.add('active'); renderWatchlist(); }
    }

    function applyFilters() {
        const val = document.getElementById('tName').value.toLowerCase();
        renderList(players.filter(p => p.type === 'public' && p.name.toLowerCase().includes(val)), 'transferGrid');
    }

    function renderList(list, elId) {
        const grid = document.getElementById(elId);
        grid.innerHTML = "";
        list.forEach(p => {
            const isW = watchlist.includes(p.id);
            grid.innerHTML += `
            <div class="player-card ${isW?'watched':''}">
                <div class="card-header">
                    <div class="rating-circle">${p.rating}</div>
                    <div class="player-info"><h3>${p.name}</h3><span>${p.team}</span></div>
                    <i class="fas fa-star ${isW?'active':''}" style="color:${isW?'gold':'#444'}; cursor:pointer; margin-left:auto; font-size:1.2rem;" onclick="toggleWatch(${p.id})"></i>
                </div>
                <div class="card-actions">
                    <button class="btn-offer" onclick="offer(${p.id})">TEKLİF YAP</button>
                </div>
            </div>`;
        });
    }

    function offer(id) {
        if(!user || user.role === 'admin') return;
        const p = players.find(x => x.id === id);
        const am = prompt("Teklif (€):", p.val + "M");
        if(am) { queue.push({pName:p.name, from:user.name}); document.getElementById('qCount').innerText = queue.length; }
    }

    function simulate() { queue = []; document.getElementById('qCount').innerText = 0; alert("Simülasyon Tamam."); }
    
    function toggleWatch(id) {
        if(watchlist.includes(id)) watchlist = watchlist.filter(x => x !== id); else watchlist.push(id);
        if(document.getElementById('section-watchlist').classList.contains('active')) renderWatchlist();
        else applyFilters();
    }
    
    function renderWatchlist() {
        renderList(players.filter(p => watchlist.includes(p.id)), 'watchlistGrid');
    }

</script>
</body>
</html>
