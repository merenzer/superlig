<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v15 | Profil & Kadro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #090909; --card: #141414; --accent: #00ff88; --text: #eee; --gold: #ffd700;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        button { cursor: pointer; font-family: inherit; }

        /* GİRİŞ & HEADER */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .team-btn { padding: 15px 30px; margin: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; border-radius: 8px; font-size: 1.1rem; transition: 0.3s; }
        .team-btn:hover { border-color: var(--accent); background: #222; transform: scale(1.05); }

        header { padding: 0 20px; height: 80px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: rgba(20,20,20,0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); }
        .brand { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
        
        /* SEKMELER */
        .tabs { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #111; }
        .tab { padding: 10px 20px; background: transparent; border: 1px solid #333; color: #888; border-radius: 20px; font-weight: bold; }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* KART TASARIMI */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        
        .card-head { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .rating { width: 45px; height: 45px; background: #000; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--accent); }
        
        .card-body { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; color: #aaa; }
        .card-body b { color: #fff; display: block; font-size: 0.95rem; }
        
        /* DETAYLI PROFİL MODALI (YENİ) */
        #profileModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #161616; width: 90%; max-width: 500px; border-radius: 16px; border: 1px solid var(--accent); overflow: hidden; position: relative; }
        .modal-header { background: #1a1a1a; padding: 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #333; }
        .big-rating { width: 70px; height: 70px; background: #000; border: 3px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .close-btn { position: absolute; top: 15px; right: 15px; color: #666; font-size: 1.5rem; cursor: pointer; }
        
        /* Profil İstatistikleri */
        .modal-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.95rem; }
        .info-row span { color: #888; }
        
        /* Hexagon Stat Grafiği (Basitleştirilmiş Liste) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; background: #111; padding: 15px; border-radius: 10px; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--gold); display: block; }
        .stat-label { font-size: 0.75rem; color: #666; text-transform: uppercase; }
        .blur-stat { filter: blur(4px); user-select: none; } /* Gizli Özellik Efekti */

        .modal-actions { padding: 20px; display: flex; gap: 10px; }
        .btn-full { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-scout { background: var(--gold); color: #000; }
        .btn-buy { background: var(--accent); color: #000; }
        .btn-sell { background: #ff4757; color: #fff; }

        /* Bildirim */
        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #000; padding: 15px 30px; border-radius: 8px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box" style="text-align: center;">
        <h1 style="color:#fff; margin-bottom:30px;">MENAJER GİRİŞİ</h1>
        <button class="team-btn" onclick="login('Galatasaray')">Galatasaray</button>
        <button class="team-btn" onclick="login('Fenerbahçe')">Fenerbahçe</button>
        <button class="team-btn" onclick="login('Beşiktaş')">Beşiktaş</button>
        <button class="team-btn" onclick="login('Trabzonspor')">Trabzonspor</button>
    </div>
</div>

<div id="profileModal">
    <div class="modal-content">
        <i class="fas fa-times close-btn" onclick="closeModal()"></i>
        
        <div class="modal-header">
            <div class="big-rating" id="mRating">85</div>
            <div>
                <h2 id="mName" style="margin:0; color:#fff;">Icardi</h2>
                <div id="mTeam" style="color:#888; font-size:0.9rem; margin-top:5px;">Galatasaray</div>
            </div>
        </div>

        <div class="modal-body">
            <div class="info-row"><span>Uyruk</span> <b id="mNation">Arjantin</b></div>
            <div class="info-row"><span>Yaş</span> <b id="mAge">31</b></div>
            <div class="info-row"><span>Boy / Ayak</span> <b id="mPhys">1.81 / Sağ</b></div>
            <div class="info-row"><span>Sözleşme</span> <b id="mContract">2026</b></div>
            <div class="info-row"><span>Piyasa Değeri</span> <b id="mVal" style="color:var(--accent)">20M €</b></div>

            <div class="stats-grid" id="statsGrid">
                </div>
        </div>

        <div class="modal-actions" id="modalActions">
            </div>
    </div>
</div>

<header>
    <div class="brand">TRANSFER V15</div>
    <div id="userBadge" style="color:var(--accent); font-weight:bold;">--</div>
</header>

<div class="tabs">
    <button class="tab active" onclick="switchTab('market')">Transfer Pazarı</button>
    <button class="tab" onclick="switchTab('squad')">Kadrom</button>
</div>

<div class="container">
    <input type="text" id="searchInput" placeholder="Oyuncu Ara..." style="width:100%; padding:15px; background:#1f1f1f; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:20px;" onkeyup="search()">
    <div class="grid" id="grid"></div>
</div>

<div id="toast">İşlem Başarılı!</div>

<script>
    const API_URL = "https://probable-space-barnacle-5gjp5jp779qxfvjrv-3000.app.github.dev/";
    let myTeam = "";
    let allPlayers = [];
    let currentTab = 'market'; // 'market' veya 'squad'

    // --- GİRİŞ ---
    function login(team) {
        myTeam = team;
        document.getElementById('userBadge').innerText = team + " Menajeri";
        document.getElementById('loginOverlay').style.display = 'none';
        loadData();
    }

    // --- VERİ ÇEKME ---
    async function loadData() {
        try {
            const res = await fetch(`${API_URL}/players`);
            allPlayers = await res.json();
            render();
        } catch (e) {
            alert("Sunucuya bağlanılamadı! 'node server.js' açık mı?");
        }
    }

    // --- RENDER (LİSTELEME) ---
    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        
        const term = document.getElementById('searchInput').value.toLowerCase();
        
        // Filtreleme Mantığı
        const filtered = allPlayers.filter(p => {
            const nameMatch = p.name.toLowerCase().includes(term);
            const isMine = p.team === myTeam;
            
            if (currentTab === 'squad') return isMine && nameMatch; // Kadrom sekmesi
            else return !isMine && nameMatch; // Pazar sekmesi (Kendiminkileri görmeyeyim)
        });

        filtered.slice(0, 100).forEach(p => {
            grid.innerHTML += `
            <div class="card" onclick="openProfile(${p.id})">
                <div class="card-head">
                    <div class="rating">${p.rating}</div>
                    <div>
                        <h3 style="margin:0">${p.name}</h3>
                        <small style="color:#888">${p.pos} • ${p.nation}</small>
                    </div>
                </div>
                <div class="card-body">
                    <div>TAKIM <b>${p.team}</b></div>
                    <div>YAŞ <b>${p.age}</b></div>
                    <div style="grid-column: span 2; text-align:right; color:var(--accent)">${p.valStr}</div>
                </div>
            </div>`;
        });
    }

    // --- PROFİL MODALI (ÖNEMLİ KISIM) ---
    function openProfile(id) {
        const p = allPlayers.find(x => x.id === id);
        if (!p) return;

        // Temel Bilgiler
        document.getElementById('mRating').innerText = p.rating;
        document.getElementById('mName').innerText = p.name;
        document.getElementById('mTeam').innerText = p.team;
        document.getElementById('mNation').innerText = p.nation;
        document.getElementById('mAge').innerText = p.age;
        document.getElementById('mPhys').innerText = `${p.height || '?'} cm / ${p.foot || '?'}`;
        document.getElementById('mContract').innerText = p.contract || '-';
        document.getElementById('mVal').innerText = p.valStr;

        // Özellikler (Scout Mantığı)
        // Eğer oyuncu benim takımımdaysa özellikler açık, değilse kapalı
        const isMine = p.team === myTeam;
        const blurClass = isMine ? '' : 'blur-stat';
        
        const statsHTML = `
            <div class="stat-box"><span class="stat-val ${blurClass}" id="s_pace">${p.stats.pace}</span><span class="stat-label">HIZ</span></div>
            <div class="stat-box"><span class="stat-val ${blurClass}" id="s_shoot">${p.stats.shooting}</span><span class="stat-label">ŞUT</span></div>
            <div class="stat-box"><span class="stat-val ${blurClass}" id="s_pass">${p.stats.passing}</span><span class="stat-label">PAS</span></div>
            <div class="stat-box"><span class="stat-val ${blurClass}" id="s_drib">${p.stats.dribbling}</span><span class="stat-label">DRİB</span></div>
            <div class="stat-box"><span class="stat-val ${blurClass}" id="s_def">${p.stats.defending}</span><span class="stat-label">DEF</span></div>
            <div class="stat-box"><span class="stat-val ${blurClass}" id="s_phy">${p.stats.physical}</span><span class="stat-label">FİZ</span></div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHTML;

        // Butonlar
        const actionsDiv = document.getElementById('modalActions');
        actionsDiv.innerHTML = "";

        if (isMine) {
            // Benim Oyuncumsa -> Satışa Çıkar
            actionsDiv.innerHTML = `<button class="btn-full btn-sell" onclick="sellPlayer(${p.id})">SATIŞ LİSTESİNE KOY</button>`;
        } else {
            // Başkasınınsa -> Scout Gönder ve Satın Al
            actionsDiv.innerHTML = `
                <button class="btn-full btn-scout" onclick="revealStats()">GÖZLEMCİ GÖNDER</button>
                <button class="btn-full btn-buy" onclick="buyPlayer(${p.id}, '${p.name}')">SATIN AL</button>
            `;
        }

        document.getElementById('profileModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('profileModal').style.display = 'none';
    }

    // --- SCOUT EFEKTİ ---
    function revealStats() {
        const stats = document.querySelectorAll('.blur-stat');
        if(stats.length === 0) return alert("Zaten raporlandı.");
        
        alert("🔍 Gözlemci gönderildi... Rapor bekleniyor...");
        setTimeout(() => {
            stats.forEach(el => el.classList.remove('blur-stat'));
            alert("✅ Rapor Geldi! Özellikler açıldı.");
        }, 1000);
    }

    // --- TRANSFER İŞLEMLERİ ---
    async function buyPlayer(id, name) {
        if(!confirm(`${name} transfer edilsin mi?`)) return;
        
        await fetch(`${API_URL}/buy`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ playerId: id, teamName: myTeam })
        });
        
        closeModal();
        showToast("Transfer Başarılı!");
        loadData();
    }

    async function sellPlayer(id) {
        if(!confirm("Oyuncu boşa çıkarılsın mı?")) return;

        await fetch(`${API_URL}/sell`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ playerId: id })
        });

        closeModal();
        showToast("Oyuncu Satış Listesine Kondu.");
        loadData();
    }

    // --- SEKME DEĞİŞİMİ ---
    function switchTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        render(); // Listeyi yeni moda göre yenile
    }

    function search() { render(); }
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }

</script>
</body>
</html>
