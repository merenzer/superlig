<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v5.5 | Güvenli Giriş</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* DARK MODE */
            --bg-body: #121212; --bg-card: #1e1e1e; --bg-input: #2c2c2c;
            --text-main: #e0e0e0; --text-muted: #a0a0a0;
            --accent-blue: #3da9fc; --accent-green: #2cb67d; --accent-gold: #ffd700;
            --danger: #ef476f; --border-color: #333333;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 50px; }

        /* GİRİŞ EKRANI */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }

        .login-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 40px; text-align: center;
            max-width: 800px; width: 90%;
            box-shadow: 0 0 50px rgba(61, 169, 252, 0.2);
        }

        .team-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-top: 30px;
        }

        .team-btn {
            background: var(--bg-input); border: 1px solid var(--border-color); color: white;
            padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .team-btn:hover { background: var(--accent-blue); color: #000; transform: translateY(-5px); }
        .team-btn i { font-size: 1.5rem; }

        /* ŞİFRE MODALI */
        #passwordModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000;
            justify-content: center; align-items: center;
        }
        .pass-content {
            background: var(--bg-card); padding: 30px; border-radius: 12px;
            border: 1px solid var(--accent-blue); text-align: center; width: 300px;
        }
        .pass-input {
            width: 100%; padding: 10px; margin: 15px 0; background: #000;
            border: 1px solid #444; color: white; border-radius: 5px; text-align: center; font-size: 1.2rem;
        }

        /* HEADER & UI */
        header { background: var(--bg-card); padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 80px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; background: var(--accent-blue); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .logout-btn { font-size: 0.8rem; color: var(--danger); cursor: pointer; text-decoration: underline; margin-left: 10px; }
        
        /* TABS & GRID */
        .nav-tabs { display: flex; justify-content: center; background: #0d0d0d; padding: 15px 0; gap: 10px; border-bottom: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: 1px solid #333; color: var(--text-muted); padding: 10px 20px; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--accent-blue); color: #000; font-weight: bold; }
        .tab-btn.scout-active { background: var(--accent-gold); color: #000; }
        .tab-btn.watch-active { background: #ff5e57; color: white; }
        
        .section-container { display: none; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section-container.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .player-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; position: relative; }
        .player-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:4px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); }
        .card-header { display: flex; align-items: center; margin-bottom: 10px; }
        .rating { width: 40px; height: 40px; border-radius: 50%; background: #222; border: 2px solid var(--accent-green); color: var(--accent-green); display: flex; align-items: center; justify-content: center; margin-right: 10px; font-weight: bold; }
        .btn-offer { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--accent-green); color: var(--accent-green); cursor: pointer; border-radius: 5px; margin-top: auto; }
        .btn-offer:hover { background: var(--accent-green); color: #000; }

        /* Hata Mesajı */
        .error-msg { color: var(--danger); font-size: 0.9rem; display: none; margin-top: 5px; }

    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color:var(--accent-blue)">MENAJER GİRİŞİ</h1>
        <p style="color:var(--text-muted)">Yönettiğiniz takımı seçin ve şifrenizi girin.</p>
        
        <div class="team-grid">
            <button class="team-btn" onclick="openPassModal('Fenerbahçe', 'FB', '1907')">
                <i class="fas fa-shield-alt" style="color:#f1c40f"></i> FB
            </button>
            <button class="team-btn" onclick="openPassModal('Galatasaray', 'GS', '1905')">
                <i class="fas fa-shield-alt" style="color:#e74c3c"></i> GS
            </button>
            <button class="team-btn" onclick="openPassModal('Trabzonspor', 'TS', '1967')">
                <i class="fas fa-shield-alt" style="color:#a55eea"></i> TS
            </button>
            <button class="team-btn" onclick="openPassModal('Göztepe', 'GOZ', '1925')">
                <i class="fas fa-shield-alt" style="color:#f39c12"></i> GÖZ
            </button>
            <button class="team-btn" onclick="openPassModal('Alanyaspor', 'ALY', '1948')">
                <i class="fas fa-shield-alt" style="color:#2ecc71"></i> ALY
            </button>
            <button class="team-btn" onclick="openPassModal('Çorum FK', 'COR', '1967')">
                <i class="fas fa-shield-alt" style="color:#c0392b"></i> ÇOR
            </button>
            <button class="team-btn" onclick="openPassModal('RB Eyüpspor', 'EYP', '1919')">
                <i class="fas fa-shield-alt" style="color:#9b59b6"></i> EYP
            </button>
            <button class="team-btn" onclick="openPassModal('Samsunspor', 'SAM', '1965')">
                <i class="fas fa-shield-alt" style="color:#e84393"></i> SAM
            </button>
        </div>
    </div>
</div>

<div id="passwordModal">
    <div class="pass-content">
        <h3 id="passTitle" style="color:var(--accent-blue)">Şifre Giriniz</h3>
        <p style="font-size:0.9rem; color:#888;">Bu takımın yöneticisi olduğunuzu doğrulayın.</p>
        <input type="password" id="passInput" class="pass-input" placeholder="****" maxlength="6">
        <div class="error-msg" id="passError">Hatalı şifre!</div>
        <button class="btn-offer" onclick="checkPassword()">GİRİŞ YAP</button>
        <button onclick="closePassModal()" style="background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">İptal</button>
    </div>
</div>

<header>
    <div style="font-weight:bold; font-size:1.2rem; color:#fff;">TRANSFER HUB</div>
    <div class="user-profile">
        <div class="user-info" style="text-align:right;">
            <div id="headerTeamCode" style="font-size:0.8rem; color:var(--accent-blue);">MENAJER</div>
            <h4 id="headerTeamName" style="margin:0;">--</h4>
            <span class="logout-btn" onclick="logout()">Çıkış Yap</span>
        </div>
        <div class="user-avatar" id="headerAvatar">?</div>
    </div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-transfer" onclick="switchTab('transfer')">Transfer</button>
    <button class="tab-btn" id="btn-scout" onclick="switchTab('scout')">Scout</button>
</div>

<div id="transfer" class="section-container active">
    <div class="grid" id="transferGrid"></div>
</div>
<div id="scout" class="section-container">
    <div class="grid" id="scoutGrid"></div>
</div>

<script>
    // --- SİSTEM DEĞİŞKENLERİ ---
    let pendingLogin = null; // Giriş yapmaya çalışılan takım verisi

    // ÖRNEK VERİ
    const playersDB = [
        { id: 1, type: 'public', name: "Icardi", team: "Galatasaray", rating: 83, val: "20M" },
        { id: 2, type: 'public', name: "Dzeko", team: "Fenerbahçe", rating: 81, val: "4M" },
        { id: 101, type: 'hidden', isRevealed: false, name: "Gizli", realName: "Arda", rating: 78, val: "45M" }
    ];

    window.onload = function() {
        checkSession();
        renderTransfer();
        renderScout();
    };

    // --- ŞİFRE VE GİRİŞ SİSTEMİ ---
    function openPassModal(name, code, correctPass) {
        pendingLogin = { name, code, correctPass };
        document.getElementById('passTitle').innerText = name + " Girişi";
        document.getElementById('passInput').value = "";
        document.getElementById('passError').style.display = 'none';
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passInput').focus();
    }

    function closePassModal() {
        document.getElementById('passwordModal').style.display = 'none';
        pendingLogin = null;
    }

    function checkPassword() {
        const input = document.getElementById('passInput').value;
        if(input === pendingLogin.correctPass) {
            // Şifre Doğru -> Giriş Yap
            completeLogin(pendingLogin);
            closePassModal();
        } else {
            // Şifre Yanlış
            document.getElementById('passError').style.display = 'block';
            
            // Titreme efekti (Görsel geri bildirim)
            const box = document.querySelector('.pass-content');
            box.style.transform = "translateX(5px)";
            setTimeout(() => box.style.transform = "translateX(-5px)", 50);
            setTimeout(() => box.style.transform = "translateX(0)", 100);
        }
    }

    // Enter tuşu ile giriş
    document.getElementById('passInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") checkPassword();
    });

    function completeLogin(userObj) {
        // Tarayıcıya kaydet
        localStorage.setItem('activeTeam', JSON.stringify({ name: userObj.name, code: userObj.code }));
        
        // UI Güncelle
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('headerTeamName').innerText = userObj.name;
        document.getElementById('headerAvatar').innerText = userObj.code;
    }

    function checkSession() {
        const stored = localStorage.getItem('activeTeam');
        if(stored) {
            const user = JSON.parse(stored);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('headerTeamName').innerText = user.name;
            document.getElementById('headerAvatar').innerText = user.code;
        }
    }

    function logout() {
        localStorage.removeItem('activeTeam');
        location.reload();
    }

    // --- UI RENDER (Basit versiyon) ---
    function switchTab(t) {
        document.querySelectorAll('.section-container').forEach(e=>e.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active','scout-active'));
        
        const btn = document.getElementById('btn-'+t);
        btn.classList.add('active');
        if(t==='scout') btn.classList.add('scout-active');
    }

    function renderTransfer() {
        const g = document.getElementById('transferGrid');
        playersDB.filter(p=>p.type==='public').forEach(p => {
            g.innerHTML += `
            <div class="player-card">
                <div class="card-header"><div class="rating">${p.rating}</div><h3>${p.name}</h3></div>
                <button class="btn-offer" onclick="alert('${p.name} için teklif gönderildi!')">TEKLİF YAP</button>
            </div>`;
        });
    }

    function renderScout() {
        const g = document.getElementById('scoutGrid');
        playersDB.filter(p=>p.type==='hidden').forEach(p => {
            g.innerHTML += `
            <div class="player-card hidden">
                <div class="card-header"><div class="rating">?</div><h3>Gizli</h3></div>
                <button class="btn-offer" style="border-color:#ffd700; color:#ffd700">RAPOR AL</button>
            </div>`;
        });
    }

</script>
</body>
</html>
