<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v7 | AI & Simulation Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS AYARLARI (Önceki premium tema korundu) --- */
        :root {
            --bg-body: #121212; --bg-card: #1e1e1e; --bg-input: #2c2c2c;
            --text-main: #e0e0e0; --text-muted: #a0a0a0;
            --accent-blue: #3da9fc; --accent-green: #2cb67d; --accent-gold: #ffd700;
            --danger: #ef476f; --border-color: #333333;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 300px; /* Admin paneli için yer */ }

        /* HEADER */
        header { background-color: var(--bg-card); padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 80px; border-bottom: 1px solid var(--border-color); }
        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; color: var(--accent-blue); }
        .user-profile { text-align: right; }

        /* GRID & CARDS */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .player-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; position: relative; }
        .player-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:4px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); }
        
        .card-header { display: flex; align-items: center; margin-bottom: 15px; }
        .rating-circle { width: 50px; height: 50px; background: #222; border: 2px solid var(--accent-green); color: var(--accent-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; margin-right: 15px; }
        
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; margin-top: 10px; width: 100%; text-align: center; }
        .status-free { background: rgba(61, 169, 252, 0.2); color: var(--accent-blue); }
        .status-pending { background: rgba(255, 215, 0, 0.2); color: var(--accent-gold); }
        .status-negotiation { background: rgba(44, 182, 125, 0.2); color: var(--accent-green); }

        .btn-offer { width: 100%; padding: 12px; background: transparent; color: var(--accent-green); border: 2px solid var(--accent-green); border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; transition:0.3s; }
        .btn-offer:hover { background: var(--accent-green); color: #000; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #555; }

        /* --- ADMIN TRAFİK POLİSİ PANELİ (YENİ) --- */
        #adminPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 280px;
            background-color: #0d0d0d; border-top: 2px solid var(--danger);
            z-index: 9999; display: flex; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .admin-sidebar { width: 200px; padding: 20px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .admin-content { flex: 1; padding: 20px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.9rem; color: #ccc; }

        .btn-admin { padding: 15px; background: var(--danger); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-align: center; }
        .btn-admin:hover { background: #c0392b; }

        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .log-success { color: var(--accent-green); }
        .log-fail { color: var(--danger); }
        .log-info { color: var(--accent-blue); }

        /* Queue Item Styles */
        .queue-item { background: #222; padding: 10px; margin-bottom: 5px; border-left: 3px solid var(--accent-gold); display: flex; justify-content: space-between; }

    </style>
</head>
<body>

<header>
    <div class="brand">TRANSFER ENGINE v7.0</div>
    <div class="user-profile">
        <h4 id="userTeamDisplay">Göztepe (Yönetici)</h4>
        <small style="color:var(--text-muted)">İtibar Puanı: 65/100</small>
    </div>
</header>

<div class="container">
    <h2 style="border-bottom: 1px solid #333; padding-bottom:10px;">Transfer Hedefleri</h2>
    <div class="grid" id="playerGrid"></div>
</div>

<div id="adminPanel">
    <div class="admin-sidebar">
        <h4 style="margin:0; color:var(--danger)">ADMIN KONTROL</h4>
        <div style="font-size:0.8rem; color:#888;">Simülasyon Tarihi: <br><span style="color:#fff">12 Haziran 2024</span></div>
        <button class="btn-admin" onclick="simulateWeek()">
            <i class="fas fa-fast-forward"></i> HAFTAYI İLERLET
        </button>
        <div style="margin-top:auto; font-size:0.7rem; color:#666;">
            Bekleyen İşlem: <strong id="pendingCount">0</strong>
        </div>
    </div>
    <div class="admin-content" id="simulationLog">
        <div style="color:yellow">> Sistem hazır. Transfer emirleri bekleniyor...</div>
    </div>
</div>

<script>
    // --- SİMÜLASYON VERİTABANI ---
    
    // Kullanıcı Takımı
    const userTeam = { name: "Göztepe", reputation: 65, budget: 20000000 };
    
    // Rakip (NPC) Takımlar ve İtibarları (AI Kararı için önemli)
    const npcTeams = [
        { name: "Galatasaray", reputation: 85 },
        { name: "Fenerbahçe", reputation: 85 },
        { name: "Trabzonspor", reputation: 75 },
        { name: "Başakşehir", reputation: 70 },
        { name: "Midtjylland", reputation: 60 } // Aral'ın takımı
    ];

    // Oyuncular (Durum: 'free', 'pending', 'negotiating', 'sold')
    let playersDB = [
        { id: 1, name: "Aral Şimşir", currentTeam: "Midtjylland", pos: "LW", rating: 74, marketVal: 8000000, status: 'free', offers: [] },
        { id: 2, name: "Can Uzun", currentTeam: "Nürnberg", pos: "CAM", rating: 76, marketVal: 12000000, status: 'free', offers: [] },
        { id: 3, name: "Semih Kılıçsoy", currentTeam: "Beşiktaş", pos: "ST", rating: 77, marketVal: 15000000, status: 'free', offers: [] }
    ];

    // Bekleyen İşlemler Kuyruğu (Traffic Cop'un önündeki dosyalar)
    let actionQueue = [];

    // --- BAŞLANGIÇ ---
    window.onload = function() {
        renderPlayers();
    };

    // --- UI RENDER ---
    function renderPlayers() {
        const grid = document.getElementById('playerGrid');
        grid.innerHTML = "";

        playersDB.forEach(p => {
            let statusHTML = `<span class="status-badge status-free">Teklife Açık</span>`;
            let btnDisabled = "";
            let btnText = "TEKLİF YAP";

            if(p.status === 'pending') {
                statusHTML = `<span class="status-badge status-pending"><i class="fas fa-clock"></i> Yanıt Bekleniyor...</span>`;
                btnDisabled = "btn-disabled";
                btnText = "İşlemde";
            } else if (p.status === 'negotiating') {
                statusHTML = `<span class="status-badge status-negotiation"><i class="fas fa-handshake"></i> Sözleşme Masası</span>`;
                btnText = "Sözleşme Öner"; // Faz 2 butonu
            }

            grid.innerHTML += `
            <div class="player-card">
                <div class="card-header">
                    <div class="rating-circle">${p.rating}</div>
                    <div>
                        <h3 style="margin:0">${p.name}</h3>
                        <small style="color:var(--text-muted)">${p.currentTeam} | Değer: ${(p.marketVal/1000000)}M €</small>
                    </div>
                </div>
                ${statusHTML}
                <div style="margin-top:10px; font-size:0.9rem;">
                    <i class="fas fa-info-circle"></i> ${p.offers.length > 0 ? p.offers.length + ' rakip teklif var' : 'Henüz teklif yok'}
                </div>
                <button class="btn-offer ${btnDisabled}" onclick="submitOffer(${p.id})" ${btnDisabled ? 'disabled' : ''}>${btnText}</button>
            </div>`;
        });
    }

    // --- KULLANICI AKSİYONU ---
    function submitOffer(playerId) {
        const p = playersDB.find(x => x.id === playerId);
        
        // Kullanıcıdan teklif al
        const amount = prompt(`${p.name} (Piyasa: ${(p.marketVal/1000000)}M €)\nTeklifiniz (€):`, p.marketVal);
        
        if(amount) {
            // 1. Teklifi havuza ekle
            const offerObj = {
                from: userTeam.name,
                reputation: userTeam.reputation, // İtibarımızı ekliyoruz
                amount: parseInt(amount),
                timestamp: Date.now(),
                isUser: true
            };
            p.offers.push(offerObj);
            p.status = 'pending'; // Oyuncuyu "Beklemede" moduna al

            // 2. Kuyruğa ekle (Traffic Cop görsün)
            actionQueue.push({ type: 'transfer_bid', playerId: p.id, offer: offerObj });
            updateAdminPanel();
            renderPlayers();

            // 3. SİMÜLASYON: Rakip yapay zeka da teklif yapsın (Heyecan olsun diye)
            generateRivalOffer(p);
        }
    }

    // --- AI RAKİP SİMÜLASYONU ---
    function generateRivalOffer(player) {
        // Rastgele büyük bir takım seç (Örn: Galatasaray)
        const rival = npcTeams[Math.floor(Math.random() * npcTeams.length)];
        
        // Piyasa değerine yakın rastgele teklif (Örn: %80 ile %120 arası)
        const variation = (Math.random() * 0.4) + 0.8; 
        const rivalAmount = Math.floor(player.marketVal * variation);

        const rivalOffer = {
            from: rival.name,
            reputation: rival.reputation,
            amount: rivalAmount,
            timestamp: Date.now(),
            isUser: false
        };

        player.offers.push(rivalOffer);
        logToConsole(`⚠️ RAKİP HAMLESİ: ${rival.name}, ${player.name} için ${rivalAmount.toLocaleString()} € teklif verdi!`);
    }

    // --- TRAFİK POLİSİ (SİMÜLASYON MOTORU) ---
    function updateAdminPanel() {
        document.getElementById('pendingCount').innerText = actionQueue.length;
    }

    function logToConsole(msg, type='info') {
        const consoleDiv = document.getElementById('simulationLog');
        let color = '#ccc';
        if(type==='success') color = '#2cb67d';
        if(type==='fail') color = '#ef476f';
        if(type==='warn') color = '#ffd700';
        
        consoleDiv.innerHTML += `<div class="log-entry" style="color:${color}">> ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // *** EN ÖNEMLİ KISIM: HAFTAYI İLERLET ***
    function simulateWeek() {
        if(actionQueue.length === 0) {
            logToConsole("İşlenecek görev yok. Dünya sakin.", "warn");
            return;
        }

        logToConsole("--- HAFTA İLERLETİLİYOR ---", "info");
        logToConsole("Transfer komiteleri toplanıyor...", "info");

        // Kuyruktaki her işlemi sırayla işle (Gerçek AI Kararı Burada)
        setTimeout(() => {
            actionQueue.forEach(action => {
                if(action.type === 'transfer_bid') {
                    processTransferDecision(action.playerId);
                }
            });
            
            // Kuyruğu temizle
            actionQueue = [];
            updateAdminPanel();
            renderPlayers(); // Arayüzü güncelle (Durumlar değişti)
        }, 1000); // 1 saniye bekleme efekti (gerilim için)
    }

    // --- YAPAY ZEKA KARAR ALGORİTMASI ---
    function processTransferDecision(playerId) {
        const player = playersDB.find(p => p.id === playerId);
        const sellingClubRep = 60; // Midtjylland'ın itibarı diyelim

        logToConsole(`${player.currentTeam}, ${player.name} için gelen teklifleri değerlendiriyor...`);

        // Teklifleri Puanla
        // FORMÜL: (Teklif Tutarı * 0.7) + (Kulüp İtibarı * 1000 * 0.3)
        // Yani para çok önemli ama itibar da etkili.
        
        let bestOffer = null;
        let highestScore = 0;

        player.offers.forEach(offer => {
            // Puan Hesaplama
            // Örnek: 15M teklif, 65 Rep => (15000000 * 0.7) + (65 * 50000) = 10.5M + 3.2M = 13.7 Puan
            // Örnek: 10M teklif, 85 Rep => (10000000 * 0.7) + (85 * 50000) = 7M + 4.2M = 11.2 Puan
            // Bu formülde Para daha baskın.
            
            // Eğer kulüp itibarı çok yüksekse oyuncunun gitme isteği artar, bu yüzden satıcı kulüp oyuncuyu tutamaz.
            // Ama satıcı kulüp paraya bakar. Biz burada Satıcı Kulübün Gözünden bakıyoruz.
            
            const score = (offer.amount * 0.8) + (offer.reputation * 50000); 
            
            logToConsole(`- ${offer.from}: ${offer.amount.toLocaleString()} € (Skor: ${Math.floor(score)})`);

            if(score > highestScore) {
                highestScore = score;
                bestOffer = offer;
            }
        });

        // KARAR ANI
        // Piyasa değerinin %90'ının altındaysa herkesi reddet
        if(bestOffer.amount < player.marketVal * 0.9) {
            logToConsole(`❌ ${player.currentTeam} TÜM TEKLİFLERİ REDDETTİ. "Paranız yetersiz."`, "fail");
            player.status = 'free'; // Tekrar boşa çıkar
            player.offers = []; // Teklifleri sıfırla
        } else {
            // Kazanan Var
            logToConsole(`✅ KABUL EDİLDİ: ${bestOffer.from} kulübünün teklifi onaylandı!`, "success");
            
            if(bestOffer.isUser) {
                logToConsole(`🎉 TEBRİKLER! Kulüp teklifini kabul etti. Şimdi oyuncu ile maaş görüşmesine (Faz 2) geçiliyor.`, "success");
                player.status = 'negotiating'; // Faz 2'ye geç
            } else {
                logToConsole(`DİKKAT: Oyuncu ${bestOffer.from} ile görüşmelere başladı. Elini çabuk tutmazsan gidecek.`, "fail");
                player.status = 'free'; // Şimdilik boşa düşürelim, rakip aldı gibi olsun
                // Gerçekte burada rakip ile anlaşma süreci başlar
            }
        }
    }

</script>

</body>
</html>
