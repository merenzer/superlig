<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout & Transfer v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-darker: #0d0d0d;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-blue: #3da9fc;
            --accent-green: #2cb67d;
            --accent-gold: #ffd700;
            --danger: #ef476f;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
        }

        /* HEADER & NAV */
        header {
            background-color: var(--bg-card);
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { font-size: 1.2rem; font-weight: 800; color: var(--accent-blue); }
        .brand i { margin-right: 8px; }

        .wallet {
            background: rgba(44, 182, 125, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            font-weight: bold;
        }

        /* TAB MENU */
        .nav-tabs {
            display: flex;
            justify-content: center;
            background: var(--bg-darker);
            padding: 10px 0;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { 
            color: var(--accent-blue); 
            border-bottom-color: var(--accent-blue); 
            font-weight: bold;
        }

        /* CONTAINERS */
        .section-container {
            display: none; /* JS ile açıp kapatacağız */
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .section-container.active { display: block; }

        /* SEARCH AREA (TRANSFER) */
        .search-area {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .search-input {
            padding: 12px;
            width: 60%;
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
        }
        
        .btn-action {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            color: #121212;
            transition: 0.3s;
        }
        .btn-blue { background: var(--accent-blue); }
        .btn-blue:hover { background: #2b90d9; }

        /* GRID SYSTEM */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* CARD DESIGN */
        .card {
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); border-color: #555; }

        .card-header {
            padding: 15px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .rating {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #222;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .card-body { padding: 15px; font-size: 0.9rem; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--text-muted); }
        .stat-val { color: var(--text-main); font-weight: 600; }

        .card-footer { padding: 15px; }
        .btn-full { width: 100%; padding: 10px; border-radius: 5px; border:none; cursor: pointer; font-weight: bold; }
        .btn-buy { background: var(--accent-green); color: #000; }
        
        /* SCOUT / HIDDEN CARD DESIGN */
        .card.hidden-player .rating { border-color: var(--text-muted); color: var(--text-muted); }
        .card.hidden-player h3 { filter: blur(4px); user-select: none; }
        .card.hidden-player .card-body { opacity: 0.5; }
        
        .btn-scout { 
            background: var(--accent-gold); 
            color: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
        }
        .btn-scout:hover { background: #e5c100; }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center; }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        
    </style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-gamepad"></i> SIMÜLASYON</div>
    <div class="wallet">
        <i class="fas fa-wallet"></i> <span id="teamBudget">5.000.000</span> €
    </div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('transfer')">Transfer Merkezi</button>
    <button class="tab-btn" onclick="switchTab('scout')">Scout Ofisi</button>
</div>

<div id="transfer" class="section-container active">
    <div class="search-area">
        <h2><i class="fas fa-globe-americas"></i> Global Transfer Pazarı</h2>
        <p style="color:var(--text-muted)">Bilinen 11.000 oyuncu arasında arama yapın.</p>
        <br>
        <input type="text" id="transferSearch" class="search-input" placeholder="Oyuncu adı yazın (Örn: Icardi)...">
        <button class="btn-action btn-blue" onclick="searchTransfer()">Ara</button>
        <p id="transferMsg" style="margin-top:10px; font-size:0.9rem; color:var(--text-muted)"></p>
    </div>
    <div class="grid" id="transferGrid"></div>
</div>

<div id="scout" class="section-container">
    <div class="search-area" style="border-color: var(--accent-gold);">
        <h2 style="color:var(--accent-gold)"><i class="fas fa-user-secret"></i> Yetenek Avcısı</h2>
        <p style="color:var(--text-muted)">Bu oyuncuların kimlikleri gizli. Rapor isteyerek özelliklerini açın.</p>
        <p><small>Her rapor bedeli: <strong>500.000 €</strong></small></p>
    </div>
    <div class="grid" id="scoutGrid"></div>
</div>

<script>
    // --- VERİTABANI SİMÜLASYONU ---
    
    // Takım Bütçesi
    let budget = 15000000; 
    const scoutCost = 500000;

    // Oyuncu Veritabanı
    // type: 'public' -> Transfer Merkezinde görünür
    // type: 'hidden' -> Scout Ofisinde görünür (isRevealed: false başlar)
    const playersDB = [
        // AÇIK OYUNCULAR (Transfer Merkezi)
        { id: 1, type: 'public', name: "Mauro Icardi", team: "Galatasaray", pos: "ST", rating: 83, age: 31, val: "20M €" },
        { id: 2, type: 'public', name: "Edin Dzeko", team: "Fenerbahçe", pos: "ST", rating: 81, age: 37, val: "4M €" },
        { id: 3, type: 'public', name: "Muslera", team: "Galatasaray", pos: "GK", rating: 80, age: 37, val: "2M €" },
        
        // GİZLİ OYUNCULAR (Scout Listesi - 2000'lik liste buraya gelecek)
        { id: 101, type: 'hidden', isRevealed: false, name: "Wonderkid A", realName: "Arda Güler (Genç)", region: "Türkiye", pos: "CAM", rating: 78, age: 18, val: "10M €" },
        { id: 102, type: 'hidden', isRevealed: false, name: "Samba Boy", realName: "Endrick", region: "Brezilya", pos: "ST", rating: 75, age: 17, val: "15M €" },
        { id: 103, type: 'hidden', isRevealed: false, name: "French Wall", realName: "Yoro", region: "Fransa", pos: "CB", rating: 76, age: 18, val: "12M €" },
        { id: 104, type: 'hidden', isRevealed: false, name: "German Engine", realName: "Wirtz", region: "Almanya", pos: "CAM", rating: 85, age: 20, val: "80M €" },
    ];

    // --- BAŞLANGIÇ ---
    updateBudgetDisplay();
    renderScoutList(); // Scout listesi her zaman hazır olsun ama gizli kalsın

    // --- FONKSİYONLAR ---

    // Sekme Değiştirme
    function switchTab(tabName) {
        document.querySelectorAll('.section-container').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    function updateBudgetDisplay() {
        document.getElementById('teamBudget').innerText = budget.toLocaleString();
    }

    // Transfer Arama (Açık Pazar)
    function searchTransfer() {
        const query = document.getElementById('transferSearch').value.toLowerCase();
        const grid = document.getElementById('transferGrid');
        const msg = document.getElementById('transferMsg');
        
        grid.innerHTML = "";
        
        if(query.length < 2) {
            msg.innerText = "En az 2 harf giriniz.";
            return;
        }

        // Sadece 'public' olanları filtrele
        const results = playersDB.filter(p => p.type === 'public' && p.name.toLowerCase().includes(query));

        if(results.length === 0) {
            msg.innerText = "Oyuncu bulunamadı.";
            return;
        }

        msg.innerText = `${results.length} sonuç bulundu.`;

        results.forEach(p => {
            const html = `
                <div class="card">
                    <div class="card-header">
                        <div class="rating">${p.rating}</div>
                        <div>
                            <h3 style="margin:0">${p.name}</h3>
                            <small style="color:var(--text-muted)">${p.pos} | ${p.team}</small>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="stat-row"><span>Yaş:</span> <span class="stat-val">${p.age}</span></div>
                        <div class="stat-row"><span>Değer:</span> <span class="stat-val">${p.val}</span></div>
                    </div>
                    <div class="card-footer">
                        <button class="btn-full btn-buy" onclick="alert('Teklif modali açılacak: ${p.name}')">TEKLİF YAP</button>
                    </div>
                </div>
            `;
            grid.innerHTML += html;
        });
    }

    // Scout Listesi (Gizli Pazar)
    function renderScoutList() {
        const grid = document.getElementById('scoutGrid');
        grid.innerHTML = "";

        // Sadece 'hidden' olanları getir
        const hiddenPlayers = playersDB.filter(p => p.type === 'hidden');

        hiddenPlayers.forEach(p => {
            if(p.isRevealed) {
                // EĞER PARASI ÖDENİP AÇILDIYSA -> NORMAL KART GÖSTER
                const html = `
                    <div class="card" style="border-color: var(--accent-gold)">
                        <div class="card-header">
                            <div class="rating" style="border-color:var(--accent-gold); color:var(--accent-gold)">${p.rating}</div>
                            <div>
                                <h3 style="margin:0; color:var(--accent-gold)">${p.realName}</h3>
                                <small style="color:var(--text-muted)">${p.pos} | ${p.region}</small>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="stat-row"><span>Yaş:</span> <span class="stat-val">${p.age}</span></div>
                            <div class="stat-row"><span>Değer:</span> <span class="stat-val">${p.val}</span></div>
                        </div>
                        <div class="card-footer">
                            <button class="btn-full btn-buy">TEKLİF YAP</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            } else {
                // EĞER GİZLİYSE -> BLURLU & SORU İŞARETLİ KART GÖSTER
                const html = `
                    <div class="card hidden-player">
                        <div class="card-header">
                            <div class="rating">?</div>
                            <div>
                                <h3 style="margin:0">Gizli Oyuncu</h3>
                                <small style="color:var(--text-muted)">${p.pos} | ${p.region}</small>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="stat-row"><span>Tahmini Yaş:</span> <span class="stat-val">${p.age}</span></div>
                            <div class="stat-row"><span>Bölge:</span> <span class="stat-val">${p.region}</span></div>
                        </div>
                        <div class="card-footer">
                            <button class="btn-full btn-scout" onclick="revealPlayer(${p.id})">
                                <i class="fas fa-search-dollar"></i> Rapor Al (-500k)
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            }
        });
    }

    // Oyuncu Açma (Parayı düş ve kartı güncelle)
    function revealPlayer(id) {
        if(budget < scoutCost) {
            alert("Yetersiz Bakiye! Rapor almak için paranız yok.");
            return;
        }

        const player = playersDB.find(p => p.id === id);
        
        if(confirm(`${player.region} bölgesindeki bu oyuncu için 500.000 € Scout ücreti ödensin mi?`)) {
            // Parayı düş
            budget -= scoutCost;
            updateBudgetDisplay();

            // Oyuncuyu 'görünür' yap
            player.isRevealed = true;
            
            // Listeyi yenile
            renderScoutList();
            
            alert(`Tebrikler! Oyuncu raporu geldi: ${player.realName}`);
        }
    }

</script>

</body>
</html>
