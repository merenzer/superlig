<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout & Transfer Merkezi | Dark Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* DARK MODE RENK PALETİ */
            --bg-body: #121212;       /* Ana Arka Plan */
            --bg-card: #1e1e1e;       /* Kart Arka Planı */
            --bg-input: #2c2c2c;      /* Input Alanları */
            --text-main: #e0e0e0;     /* Ana Yazı Rengi */
            --text-muted: #a0a0a0;    /* Yan Yazı Rengi */
            
            --accent-blue: #3da9fc;   /* Parlak Mavi (Vurgu) */
            --accent-green: #2cb67d;  /* Onay/Yeşil */
            --border-color: #333333;  /* Çerçeve Rengi */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        /* Üst Menü */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 1px;
        }

        header .user-menu {
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        
        header .user-menu:hover { color: var(--accent-blue); }

        /* Arama / Scout Alanı */
        .scout-container {
            background: var(--bg-card);
            padding: 30px;
            margin: 30px auto;
            max-width: 800px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .scout-container h2 { margin-top: 0; color: var(--white); }
        .scout-container p { color: var(--text-muted); }

        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 15px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(61, 169, 252, 0.3);
        }

        .search-box button {
            padding: 15px 30px;
            background-color: var(--accent-blue);
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, background 0.3s;
        }

        .search-box button:hover {
            background-color: #3496db;
            transform: translateY(-2px);
        }

        /* Sonuç Alanı */
        .results-info {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 20px 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Oyuncu Kartı Tasarımı (Dark) */
        .player-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
        }

        .player-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: #444;
        }

        .card-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .rating-circle {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #2c3e50, #000);
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            margin-right: 15px;
            box-shadow: 0 0 10px rgba(44, 182, 125, 0.2);
        }

        .player-info h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .player-info span {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-stats {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: rgba(255,255,255,0.03);
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
        }
        
        .stat-item span { color: var(--text-muted); }
        .stat-item strong { color: var(--text-main); }

        .card-actions {
            padding: 20px;
            margin-top: auto; 
        }

        .btn-offer {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--accent-green);
            border: 2px solid var(--accent-green);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-offer:hover { 
            background-color: var(--accent-green); 
            color: #121212; 
        }

        /* MODAL (Karanlık Tema) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); /* Arka planı daha koyulaştırdık */
            backdrop-filter: blur(5px); /* Arkası buzlu cam gibi olsun */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .close-modal {
            position: absolute;
            right: 20px; top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }
        
        .close-modal:hover { color: var(--accent-blue); }
        
        .modal h3 { margin-top: 0; color: var(--accent-blue); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.9rem;}
        
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--bg-input); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            color: var(--text-main);
            box-sizing: border-box; /* Padding taşmasını engeller */
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-blue);
            outline: none;
        }
        
        .btn-submit { 
            background-color: var(--accent-blue); 
            color: #121212; 
            width: 100%; 
            padding: 12px; 
            border:none; 
            border-radius:6px; 
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-submit:hover { background-color: #3496db; }

    </style>
</head>
<body>

<header>
    <div class="logo">
        <i class="fas fa-shield-alt" style="color:var(--accent-green)"></i> 
        DISCORD LIGI <span style="font-size:0.8em; opacity:0.7;">MANAGER</span>
    </div>
    <div class="user-menu"><i class="fas fa-user-circle"></i> Menajer Paneli</div>
</header>

<div class="scout-container">
    <h2><i class="fas fa-binoculars" style="color:var(--accent-blue)"></i> Scout Merkezi</h2>
    <p>Lig veritabanında oyuncu arayın.</p>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Oyuncu adı giriniz (Örn: Icardi)..." autocomplete="off">
        <button onclick="scoutPlayers()"><i class="fas fa-search"></i> BUL</button>
    </div>
</div>

<div class="results-info" id="resultInfo"></div>

<div class="player-grid" id="playerGrid">
    </div>

<div id="offerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalPlayerName">Oyuncu Adı</h3>
        
        <div class="form-group">
            <label>İşlem Türü</label>
            <select id="offerType">
                <option value="Bonservis">📝 Bonservis (Satın Alma)</option>
                <option value="Kiralik">🤝 Kiralama</option>
            </select>
        </div>

        <div class="form-group">
            <label>Teklif Miktarı (€)</label>
            <input type="number" id="offerAmount" placeholder="Örn: 5000000">
        </div>

        <div class="form-group">
            <label>Takımınız</label>
            <input type="text" id="teamName" placeholder="Takım isminiz">
        </div>

        <button class="btn-submit" onclick="submitOffer()">TEKLİFİ GÖNDER</button>
    </div>
</div>

<script>
    // --- ÖRNEK VERİ (Senin listeni buraya bağlayacağız) ---
    const playersData = [
        { id: 1, name: "Mauro Icardi", team: "Galatasaray", position: "ST", rating: 83, age: 31, value: "20.000.000 €" },
        { id: 2, name: "Edin Dzeko", team: "Fenerbahçe", position: "ST", rating: 81, age: 37, value: "4.000.000 €" },
        { id: 3, name: "Gedson Fernandes", team: "Beşiktaş", position: "CM", rating: 79, age: 25, value: "15.000.000 €" },
        { id: 4, name: "Kevin De Bruyne", team: "Man City", position: "CM", rating: 91, age: 32, value: "70.000.000 €" },
        { id: 5, name: "Kylian Mbappe", team: "PSG", position: "LW", rating: 92, age: 25, value: "180.000.000 €" }
    ];

    const playerGrid = document.getElementById('playerGrid');
    const searchInput = document.getElementById('searchInput');
    const modal = document.getElementById('offerModal');
    let selectedPlayer = null;

    // Enter tuşu desteği
    searchInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            scoutPlayers();
        }
    });

    function scoutPlayers() {
        const query = searchInput.value.toLowerCase().trim();
        playerGrid.innerHTML = ""; 

        if(query.length < 2) {
            document.getElementById('resultInfo').innerText = "Scout sistemini başlatmak için en az 2 harf girin.";
            return;
        }

        const results = playersData.filter(p => p.name.toLowerCase().includes(query));

        if(results.length === 0) {
            document.getElementById('resultInfo').innerHTML = `<i class="fas fa-times-circle"></i> "${query}" isminde bir oyuncu veritabanında bulunamadı.`;
            return;
        }

        document.getElementById('resultInfo').innerText = `${results.length} oyuncu raporlandı.`;

        results.forEach(player => {
            const card = document.createElement('div');
            card.className = 'player-card';
            
            // Kart HTML Yapısı
            card.innerHTML = `
                <div class="card-header">
                    <div class="rating-circle">${player.rating}</div>
                    <div class="player-info">
                        <h3>${player.name}</h3>
                        <span><i class="fas fa-tshirt"></i> ${player.position} &bull; ${player.team}</span>
                    </div>
                </div>
                <div class="card-stats">
                    <div class="stat-item"><span>Yaş</span> <strong>${player.age}</strong></div>
                    <div class="stat-item"><span>Piyasa Değeri</span> <strong>${player.value}</strong></div>
                </div>
                <div class="card-actions">
                    <button class="btn-offer" onclick="openModal('${player.name}')">
                        <i class="fas fa-file-signature"></i> Teklif Yap
                    </button>
                </div>
            `;
            playerGrid.appendChild(card);
        });
    }

    function openModal(playerName) {
        selectedPlayer = playerName;
        document.getElementById('modalPlayerName').innerText = playerName;
        modal.style.display = "flex";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    function submitOffer() {
        const amount = document.getElementById('offerAmount').value;
        const team = document.getElementById('teamName').value;
        const type = document.getElementById('offerType').value;

        if(!amount || !team) {
            alert("Eksik bilgi: Lütfen teklif miktarı ve takım adını giriniz.");
            return;
        }

        // Simülasyon mesajı
        alert(`✅ İŞLEM BAŞARILI!\n\nOyuncu: ${selectedPlayer}\nTakım: ${team}\nTeklif: ${amount} €\nDurum: Admin Onayına Gönderildi.`);
        
        closeModal();
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
