<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Ligi v10.2 | Realistic Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #121212; --bg-card: #1e1e1e; --bg-input: #2b2b2b;
            --text-main: #f0f0f0; --text-muted: #a0a0a0;
            --accent-blue: #3da9fc; --accent-green: #2cb67d; --accent-gold: #ffd700;
            --danger: #ef476f; --border-color: #333333;
            /* KITA RENKLERİ (Referans Görselden) */
            --c-na: #008fd5; --c-sa: #00a859; --c-eu: #ef3e36; --c-af: #fce300; --c-as: #f58220; --c-au: #e9008c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 300px; }
        button, select, input { font-family: inherit; outline: none; }

        /* --- ORTAK CSS --- */
        header { background: var(--bg-card); padding: 0 2rem; height: 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .user-profile { display: flex; align-items: center; gap: 15px; text-align: right; }
        .user-avatar { width: 40px; height: 40px; background: var(--accent-blue); color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        .nav-tabs { display: flex; justify-content: center; background: #0d0d0d; padding: 15px 0; gap: 10px; border-bottom: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: 1px solid #333; color: var(--text-muted); padding: 10px 25px; cursor: pointer; border-radius: 30px; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }

        .page-section { display: none; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- YENİ GERÇEKÇİ HARİTA CSS --- */
        .map-wrapper {
            background: #0d0d0d; border-radius: 20px; border: 1px solid var(--border-color);
            padding: 30px; text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .map-title { color: var(--accent-gold); margin-bottom: 5px; }
        .world-map-svg { width: 100%; max-width: 900px; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        
        /* Kıtaların Başlangıç Hali (Vektör/Nötr) */
        .continent {
            fill: #2a2a2a; /* Nötr koyu renk */
            stroke: #121212; stroke-width: 1.5;
            transition: all 0.4s ease; cursor: pointer;
        }
        
        /* Hover Efekti: Üzerine gelince renklenir ve parlar */
        .continent:hover { transform: scale(1.02); filter: brightness(1.3); stroke: #fff; }
        
        /* Hover Rengi Atamaları */
        .c-na:hover { fill: var(--c-na); }
        .c-sa:hover { fill: var(--c-sa); }
        .c-eu:hover { fill: var(--c-eu); }
        .c-af:hover { fill: var(--c-af); }
        .c-as:hover { fill: var(--c-as); }
        .c-au:hover { fill: var(--c-au); }

        .scout-results-title { margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; color: var(--accent-blue); font-weight: bold; display: none; }

        /* --- MODALLAR --- */
        #loginOverlay, #passwordModal, #scoutModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #passwordModal, #scoutModal { background: rgba(0,0,0,0.9); z-index: 10000; display: none; }
        .modal-box { background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--accent-blue); width: 400px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { font-size: 0.85rem; color: #888; display: block; margin-bottom: 5px; }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid #333; text-align: center; width: 90%; max-width: 800px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; margin-top: 30px; }
        .team-btn { background: #252525; border: 1px solid #333; color: #ccc; padding: 20px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .team-btn:hover { border-color: var(--accent-blue); background: #2a2a2a; color: #fff; }
        .team-btn.admin-btn { border-color: var(--danger); } .team-btn.admin-btn:hover { background: var(--danger); }

        /* --- FİLTRE VE KARTLAR --- */
        .filter-panel { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .filter-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .search-input, .filter-select { height: 45px; padding: 0 15px; background: var(--bg-input); border: 1px solid var(--border-color); color: #fff; border-radius: 8px; flex: 1; min-width: 140px; }
        .btn-action { height: 45px; padding: 0 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--accent-blue); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .player-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); transition: 0.3s; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .player-card:hover { transform: translateY(-5px); border-color: #555; }
        .player-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:4px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); }
        .card-header { padding: 20px; display: flex; align-items: flex-start; gap: 15px; }
        .rating-circle { width: 50px; height: 50px; background: #151515; border: 2px solid var(--accent-green); color: var(--accent-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; flex-shrink: 0; }
        .player-info h3 { margin: 0; font-size: 1.1rem; color: #fff; }
        .player-info span { font-size: 0.8rem; color: #888; display: block; margin-top: 3px; }
        .status-badge { margin: 0 20px 15px 20px; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .st-free { background: rgba(61, 169, 252, 0.1); color: var(--accent-blue); }
        .st-pending { background: rgba(255, 215, 0, 0.1); color: var(--accent-gold); }
        .card-stats { padding: 15px 20px; background: rgba(255,255,255,0.02); display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a; }
        .stat-item span { display: block; font-size: 0.7rem; color: #777; text-transform: uppercase; }
        .stat-item strong { color: #ddd; font-size: 0.95rem; }
        .card-actions { padding: 20px; margin-top: auto; }
        .btn-offer { width: 100%; height: 40px; background: transparent; color: var(--accent-green); border: 1px solid var(--accent-green); border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .fav-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #444; font-size: 1.2rem; cursor: pointer; }
        .fav-btn.active { color: var(--accent-gold); }

        /* ADMIN PANEL */
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 250px; background: #080808; border-top: 2px solid var(--danger); z-index: 8000; display: none; }
        .admin-layout { display: flex; height: 100%; }
        .admin-controls { width: 200px; padding: 20px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .admin-queue { flex: 1; padding: 20px; overflow-y: auto; }
        .queue-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .queue-table th { text-align: left; color: #666; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .queue-table td { padding: 10px 0; border-bottom: 1px solid #222; color: #ccc; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color:#fff; margin:0;">TRANSFER LİGİ</h1>
        <p style="color:#888;">Rol Seçimi</p>
        <div class="team-grid">
            <div class="team-btn" onclick="openPassModal('Galatasaray', 'GS', 85, '1905', 'manager')"><i class="fas fa-shield-alt" style="color:#e74c3c"></i><span>GS</span></div>
            <div class="team-btn" onclick="openPassModal('Fenerbahçe', 'FB', 85, '1907', 'manager')"><i class="fas fa-shield-alt" style="color:#f1c40f"></i><span>FB</span></div>
            <div class="team-btn" onclick="openPassModal('Beşiktaş', 'BJK', 80, '1903', 'manager')"><i class="fas fa-shield-alt" style="color:#fff"></i><span>BJK</span></div>
            <div class="team-btn" onclick="openPassModal('Trabzonspor', 'TS', 75, '1967', 'manager')"><i class="fas fa-shield-alt" style="color:#a55eea"></i><span>TS</span></div>
            <div class="team-btn" onclick="openPassModal('Göztepe', 'GOZ', 65, '1925', 'manager')"><i class="fas fa-shield-alt" style="color:#f39c12"></i><span>GÖZ</span></div>
            <div class="team-btn admin-btn" onclick="openPassModal('TFF (Admin)', 'TFF', 100, '2024', 'admin')"><i class="fas fa-user-tie"></i><span>TFF</span></div>
        </div>
    </div>
</div>

<div id="passwordModal">
    <div class="modal-box" style="width:300px;">
        <h3 id="passTitle" style="margin-top:0; color:var(--accent-blue)">Giriş</h3>
        <input type="password" id="passInput" class="search-input" placeholder="****" maxlength="4" style="text-align:center; font-size:1.5rem; letter-spacing:5px;">
        <div id="passError" style="color:var(--danger); display:none; margin-top:10px;">Hatalı Şifre</div>
        <button class="btn-action" onclick="checkPassword()" style="width:100%; margin-top:15px;">GİRİŞ</button>
        <button onclick="closePassModal()" style="background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">Vazgeç</button>
    </div>
</div>

<div id="scoutModal">
    <div class="modal-box">
        <h2 style="color:var(--accent-gold); margin-top:0;"><i class="fas fa-globe"></i> Bölge Analizi</h2>
        <p id="selectedContinent" style="color:#fff; border-bottom:1px solid #333; padding-bottom:10px;">Bölge Seçilmedi</p>
        <div class="form-group">
            <label class="form-label">Aranan Mevki</label>
            <select id="scoutPos" class="filter-select" style="width:100%">
                <option value="Any">Farketmez</option><option value="ST">Forvet</option><option value="LW">Kanat</option><option value="CAM">Orta Saha</option><option value="CB">Defans</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Yaş Aralığı</label>
            <div style="display:flex; gap:10px;">
                <input type="number" class="search-input" placeholder="Min" value="16">
                <input type="number" class="search-input" placeholder="Max" value="23">
            </div>
        </div>
        <button class="btn-action" onclick="sendScout()" style="width:100%; background:var(--accent-gold); color:#000;">EKİBİ GÖNDER</button>
        <button onclick="closeScoutModal()" style="background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">İptal</button>
    </div>
</div>

<header>
    <div class="brand"><i class="fas fa-bolt"></i> TRANSFER v10.2</div>
    <div class="user-profile">
        <div><h4 id="headerTeamName" style="margin:0; font-size:0.9rem; color:#fff;">--</h4></div>
        <div class="user-avatar" id="headerAvatar">?</div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--danger); margin-left:15px; cursor:pointer;"></i>
    </div>
</header>

<div class="nav-tabs" id="managerTabs">
    <button class="tab-btn active" id="btn-transfer" onclick="switchPage('section-transfer')">Transfer</button>
    <button class="tab-btn" id="btn-scout" onclick="switchPage('section-scout')">Scout</button>
    <button class="tab-btn" id="btn-watchlist" onclick="switchPage('section-watchlist')">Takip</button>
</div>

<div id="section-transfer" class="page-section active">
    <div class="filter-panel">
        <div class="filter-row">
            <input type="text" id="tName" class="search-input" placeholder="Ad..." style="flex:2">
            <input type="text" id="tNation" class="search-input" placeholder="Uyruk..." style="flex:1">
        </div>
        <div class="filter-row">
            <select id="tLeague" class="filter-select" onchange="updateTeamSelect()"><option value="">Tüm Ligler</option><option value="Süper Lig">Süper Lig</option></select>
            <select id="tTeam" class="filter-select" disabled><option value="">Önce Lig</option></select>
            <button class="btn-action" onclick="applyFilters()"><i class="fas fa-search"></i></button>
        </div>
    </div>
    <div class="grid" id="transferGrid"></div>
</div>

<div id="section-scout" class="page-section">
    <div class="map-wrapper">
        <h2 class="map-title">Scout Ağı</h2>
        <p style="color:#888; margin-bottom:20px;">Ekip göndermek istediğiniz kıtaya tıklayın.</p>

    <div id="scoutResultsTitle" class="scout-results-title">Scout Raporları</div>
    <div class="grid" id="scoutResultsGrid"></div>
</div>

<div id="section-watchlist" class="page-section">
    <h3 style="color:#888; border-bottom:1px solid #333; padding-bottom:10px;">Takip Listem</h3>
    <div class="grid" id="watchlistGrid"></div>
</div>

<div id="adminPanel">
    <div class="admin-layout">
        <div class="admin-controls">
            <div style="color:var(--danger); font-weight:bold;">TFF YÖNETİM</div>
            <div style="font-size:0.8rem; color:#888;">Bekleyen: <strong id="queueCount" style="color:#fff">0</strong></div>
            <button class="btn-action" onclick="simulateWeek()" style="margin-top:auto; background:var(--danger); color:#fff; width:100%;">İLERLET</button>
        </div>
        <div class="admin-queue">
            <table class="queue-table"><thead><tr><th>OYUNCU</th><th>TAKIM</th><th>TEKLİF</th><th>DURUM</th></tr></thead><tbody id="queueTableBody"></tbody></table>
        </div>
    </div>
</div>

<script>
    let currentUser=null, pendingLogin=null, actionQueue=[], watchlist=[];
    const teamsByLeague={"Süper Lig":["GS","FB","BJK"]};
    const playersDB=[
        {id:1, type:'public', name:"Icardi", team:"GS", league:"Süper Lig", nation:"Arjantin", pos:"ST", rating:83, val:20000000, status:'free', offers:[]},
        {id:101, type:'hidden', region:'Afrika', name:"Gizli", realName:"Fofana", team:"Chelsea", pos:"ST", rating:76, age:21, val:12000000, offers:[]},
        {id:102, type:'hidden', region:'Güney Amerika', name:"Gizli", realName:"Endrick", team:"Palmeiras", pos:"ST", rating:75, age:17, val:30000000, offers:[]},
        {id:103, type:'hidden', region:'Avrupa', name:"Gizli", realName:"K. Yıldız", team:"Juve", pos:"LW", rating:76, age:18, val:25000000, offers:[]}
    ];
    window.onload=function(){checkSession();};

    // SCOUT
    function openScoutModal(c){document.getElementById('selectedContinent').innerText=c; document.getElementById('scoutModal').style.display='flex'; document.getElementById('scoutModal').setAttribute('data-region',c);}
    function closeScoutModal(){document.getElementById('scoutModal').style.display='none';}
    function sendScout(){
        const r=document.getElementById('scoutModal').getAttribute('data-region');
        closeScoutModal(); alert(`✈️ Scout ekibi ${r} bölgesine gönderildi.`);
        setTimeout(()=>{renderScoutResults(playersDB.filter(p=>p.type==='hidden'&&p.region===r));},1000);
    }
    function renderScoutResults(list){
        document.getElementById('scoutResultsTitle').style.display='block'; const grid=document.getElementById('scoutResultsGrid'); grid.innerHTML="";
        if(list.length===0){grid.innerHTML="<p>Oyuncu bulunamadı.</p>";return;}
        list.forEach(p=>{
            grid.innerHTML+=`
            <div class="player-card" style="border-color:var(--accent-gold);">
                <div class="card-header"><div class="rating-circle" style="border-color:#666;color:#666;">?</div><div><h3 style="filter:blur(5px);">GİZLİ</h3><small style="color:var(--accent-gold)">${p.region}</small></div></div>
                <div class="card-actions"><button class="btn-offer" onclick="alert('Rapor: ${p.realName}')" style="border-color:var(--accent-gold);color:var(--accent-gold);">RAPORU AÇ</button></div>
            </div>`;
        });
    }

    // CORE
    function switchPage(sid){document.querySelectorAll('.page-section').forEach(e=>e.classList.remove('active')); document.getElementById(sid).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); if(sid.includes('transfer')) document.getElementById('btn-transfer').classList.add('active'); if(sid.includes('scout')) document.getElementById('btn-scout').classList.add('active'); if(sid.includes('watchlist')) {document.getElementById('btn-watchlist').classList.add('active'); renderWatchList();}}
    function applyFilters(){ const n=document.getElementById('tName').value.toLowerCase(); renderPlayers(playersDB.filter(p=>p.type==='public'&&p.name.toLowerCase().includes(n)),'transferGrid'); }
    function renderPlayers(list,eid){
        const g=document.getElementById(eid); g.innerHTML=""; if(list.length===0){g.innerHTML="<p>Yok.</p>";return;}
        list.forEach(p=>{ g.innerHTML+=`<div class="player-card"><div class="card-header"><div class="rating-circle">${p.rating}</div><div><h3>${p.name}</h3><small>${p.team}</small></div></div><div class="card-actions"><button class="btn-offer" onclick="submitOffer(${p.id})">TEKLİF</button></div></div>`; });
    }
    function submitOffer(id){if(!currentUser||currentUser.role==='admin')return; actionQueue.push({pName:playersDB.find(x=>x.id===id).name,from:currentUser.name}); updateQ();}
    function updateQ(){const tb=document.getElementById('queueTableBody'); tb.innerHTML=""; actionQueue.forEach(a=>{tb.innerHTML+=`<tr><td>${a.pName}</td><td>${a.from}</td><td>-</td><td>Bekliyor</td></tr>`;}); document.getElementById('queueCount').innerText=actionQueue.length;}
    function simulateWeek(){actionQueue=[]; updateQ(); alert("İlerletildi.");}

    // LOGIN
    function openPassModal(n,c,r,p,rl){pendingLogin={name:n,code:c,rep:r,pass:p,role:rl};document.getElementById('passwordModal').style.display='flex';}
    function closePassModal(){document.getElementById('passwordModal').style.display='none';}
    function checkPassword(){if(document.getElementById('passInput').value===pendingLogin.pass){currentUser=pendingLogin;localStorage.setItem('u_v102',JSON.stringify(currentUser));init();}}
    function init(){document.getElementById('loginOverlay').style.display='none';document.getElementById('passwordModal').style.display='none';document.getElementById('headerTeamName').innerText=currentUser.name; if(currentUser.role==='admin'){document.getElementById('adminPanel').style.display='block';document.getElementById('managerTabs').style.display='none';}else{document.getElementById('managerTabs').style.display='flex';switchPage('section-transfer');applyFilters();}}
    function checkSession(){const s=localStorage.getItem('u_v102');if(s){currentUser=JSON.parse(s);init();}}
    function logout(){localStorage.removeItem('u_v102');location.reload();}
</script>
