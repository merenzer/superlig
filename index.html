<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscordToto Fikstür</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');

        /* --- DEĞİŞKENLER VE HAREKETLİ BULUT RENKLERİ --- */
        :root {
            /* Lig 1 (Blush Aura) Renkleri */
            --color-bg: #ff91cb;
            --color-blob1: #ed1e79;
            --color-blob2: #f34494;
            --color-blob3: #f96bb0;
            
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.8);
            --shadow-glass: 0 10px 40px rgba(0, 0, 0, 0.15);
            --shadow-text: 0 2px 10px rgba(0,0,0,0.3);
            --accent: #fff;
        }

        /* Lig 2 (Solar Flare) Renkleri */
        body.lig2 {
            --color-bg: #049cce;
            --color-blob1: #05217a;
            --color-blob2: #054a96;
            --color-blob3: #0473b2;
            --glass-bg: rgba(0, 0, 0, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 20px 15px 200px 15px;
            color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
            background-color: var(--color-bg);
            transition: background-color 1s ease;
        }

        /* --- HAREKETLİ ARKA PLAN (ANIMATED MESH GRADIENT) --- */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(90px);
            opacity: 0.8; animation: float 12s infinite ease-in-out alternate;
            transition: background-color 1s ease;
        }
        .blob-1 { width: 60vw; height: 60vw; background-color: var(--color-blob1); top: -10%; left: -10%; animation-delay: 0s; }
        .blob-2 { width: 50vw; height: 50vw; background-color: var(--color-blob2); bottom: -20%; right: -10%; animation-delay: -4s; }
        .blob-3 { width: 40vw; height: 40vw; background-color: var(--color-blob3); top: 30%; left: 40%; animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 10vh) scale(1.1); }
        }

        /* --- SAĞ ALTTAN KAYARAK GELME EFEKTİ --- */
        @keyframes slideInFromBottomRight {
            0% { opacity: 0; transform: translate(100px, 100px); }
            100% { opacity: 1; transform: translate(0, 0); }
        }

        .view-active {
            display: block !important;
            animation: slideInFromBottomRight 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        #main-view, #standings-view, #team-view { display: none; }

        /* --- ÜST MENÜ VE BAŞLIK --- */
        .header-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; }
        .site-logo { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(var(--shadow-text)); }
        
        h1.main-title {
            text-align: center; color: var(--text-main); font-weight: 900;
            font-size: 2.5em; margin: 0; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: var(--shadow-text);
        }

        .top-controls {
            display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap;
            margin-bottom: 30px; z-index: 3000;
        }

        .control-btn {
            padding: 12px 24px; border-radius: 30px; 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            cursor: pointer; font-weight: 800; font-size: 0.9em; color: var(--text-main); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            text-transform: uppercase; letter-spacing: 1px; text-shadow: var(--shadow-text);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: var(--shadow-glass);
            display: flex; align-items: center; gap: 8px;
        }
        .control-btn span { font-size: 1.4em; } 
        .control-btn:hover { background: rgba(255,255,255,0.25); transform: translateY(-3px) scale(1.05); }
        .control-btn.active { background: rgba(255,255,255,0.4); font-weight: 900; border-color: #fff; }

        #admin-toggle.on { background: rgba(46, 204, 113, 0.6); border-color: #2ecc71; }
        #reset-db-btn { display: none; background: rgba(231, 76, 60, 0.6); border-color: #e74c3c; margin-left: 10px;}

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 20px 40px; border-radius: 20px; font-weight: 800; z-index: 9999; backdrop-filter: blur(15px); }

        /* --- FİKSTÜR KARTLARI (CAM) --- */
        .fixture-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; max-width: 1350px; margin: 0 auto 100px auto;
        }
        .week-card {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; padding: 22px; box-shadow: var(--shadow-glass);
            border: 1px solid var(--glass-border); transition: transform 0.4s ease;
        }
        .week-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); border-color: #fff; }
        
        .week-header { display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .week-number { font-size: 2.2em; font-weight: 900; color: #fff; margin-right: 12px; line-height: 1; text-shadow: var(--shadow-text);}
        .week-label { font-size: 1.1em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: var(--shadow-text);}
        
        .match-row { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .match-row:last-child { border-bottom: none; padding-bottom: 0;}
        
        .match-teams { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        
        .team-box { display: flex; align-items: center; gap: 12px; flex: 1; font-weight: 800; font-size: 0.95em; text-shadow: var(--shadow-text); }
        .team-box.home { justify-content: flex-start; text-align: left; }
        .team-box.away { justify-content: flex-end; text-align: right; }
        
        .mini-logo { width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
        
        .match-score { flex: 0 0 auto; text-align: center; margin: 0 10px; min-width: 65px;}
        .vs { color: var(--text-sub); font-weight: 800; font-size: 1.1em; text-shadow: var(--shadow-text);}
        .score-input { width: 35px; text-align: center; font-weight: 900; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; margin: 0 3px; padding: 6px; font-size: 1em; background: rgba(0,0,0,0.4); color: #fff; text-shadow: var(--shadow-text);}
        .score-input:focus { border-color: #fff; outline: none; background: rgba(0,0,0,0.6); }

        .match-stadium-mini { font-size: 0.8em; color: var(--text-sub); margin-top: 10px; font-weight: 700; text-align: center; text-shadow: var(--shadow-text); background: rgba(0,0,0,0.15); padding: 4px 12px; border-radius: 12px;}

        /* --- TAKIM DETAY SAYFASI --- */
        .team-header-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; background: var(--glass-bg); backdrop-filter: blur(25px); padding: 30px; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: var(--shadow-glass); }
        .team-header-logo { width: 130px; height: 130px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5)); }
        .team-name-big { font-size: 2.5em; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: var(--shadow-text); margin: 0; text-align: center; }
        .team-header-stadium { font-size: 1em; color: #fff; font-weight: 800; margin-top: 12px; background: rgba(0,0,0,0.3); padding: 10px 25px; border-radius: 20px; border: 1px solid var(--glass-border); text-transform: uppercase; }
        
        .gs-match-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: var(--shadow-glass);
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; margin-bottom: 15px; transition: transform 0.3s ease;
        }
        .gs-match-card:hover { transform: translateX(8px); background: rgba(255,255,255,0.25); }
        .card-left { display: flex; align-items: center; flex: 2; gap: 15px;}
        .week-badge { background-color: rgba(0,0,0,0.5); color: #fff; font-weight: 800; padding: 8px 12px; border-radius: 10px; min-width: 35px; text-align: center; font-size: 0.9em; border: 1px solid var(--glass-border); }
        .location-icon { font-size: 1.5em; filter: drop-shadow(var(--shadow-text)); }
        .match-details { font-size: 1.1em; font-weight: 800; color: #fff; text-shadow: var(--shadow-text);}
        .stadium-info-list { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 15px;}

        /* --- ALT LOGO SEÇİCİ --- */
        .team-selector-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 10px; background: rgba(0, 0, 0, 0.4);
            border-radius: 30px 30px 0 0; border-top: 1px solid var(--glass-border);
            box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.6); text-align: center;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2000;
            max-height: 30vh; overflow-y: auto;
        }
        .logo-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .team-logo-btn {
            width: 58px; height: 58px; background-color: rgba(255,255,255,0.85);
            border: 2px solid transparent; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            background-size: 70%; background-position: center; background-repeat: no-repeat;
        }
        .team-logo-btn:hover, .team-logo-btn.active {
            border-color: #fff; transform: translateY(-8px) scale(1.15); box-shadow: 0 10px 25px rgba(255,255,255,0.5); background-color: #fff;
        }

        /* --- PUAN DURUMU --- */
        .standings-container { max-width: 950px; margin: 0 auto; background: var(--glass-bg); backdrop-filter: blur(30px); padding: 25px; border-radius: 24px; border: 1px solid var(--glass-border); overflow-x: auto; box-shadow: var(--shadow-glass); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; text-align: center; } 
        th { padding: 15px; color: #fff; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; text-shadow: var(--shadow-text);}
        
        td { padding: 14px 10px; font-weight: 800; vertical-align: middle; font-size: 1em; text-shadow: var(--shadow-text); background: rgba(0,0,0,0.1); }
        td:first-child { border-radius: 10px 0 0 10px; }
        td:last-child { border-radius: 0 10px 10px 0; font-weight: 900; font-size: 1.2em; background: rgba(0,0,0,0.25);} 

        tr { transition: transform 0.2s ease; }
        tr:hover { transform: scale(1.01); }

        .legend-box { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin-top:25px; font-size:0.9em; font-weight:800; text-shadow:var(--shadow-text); background: rgba(0,0,0,0.3); padding: 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2);}
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .color-dot { width: 16px; height: 16px; border-radius: 4px; box-shadow: 0 0 8px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.5); }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; gap: 5px; }
            h1.main-title { font-size: 1.8em; }
            .site-logo { width: 50px; height: 50px; }
            .fixture-container { grid-template-columns: 1fr; gap: 15px;}
            .team-logo-btn { width: 48px; height: 48px; }
            .gs-match-card { flex-direction: column; align-items: flex-start; gap: 12px; padding: 15px;}
            .stadium-info-list { width: 100%; justify-content: space-between; flex-direction: row-reverse;}
            th, td { padding: 10px 5px; font-size: 0.85em; }
            .legend-box { flex-direction: column; align-items: flex-start; gap: 10px;}
        }
    </style>
</head>

        function updateLogoGrid() {
            const activeTeams = new Set();
            fixtureData.forEach(m => { activeTeams.add(m.h); activeTeams.add(m.a); });

            const gridHtml = teamDetails
                .filter(t => activeTeams.has(t.name) || activeTeams.has(t.shortName))
                .sort((a,b) => a.name.localeCompare(b.name))
                .map(t => `<div class="team-logo-btn" style="background-image:url('${t.logo}')" onclick="showTeam('${t.name}')" title="${t.name}"></div>`)
                .join('');
            
            document.getElementById('logo-grid').innerHTML = gridHtml;
        }

        function loadLeagueData(leagueId) {
            if (unsubscribeFixtures) unsubscribeFixtures();
            if (unsubscribePenalties) unsubscribePenalties();

            document.getElementById('loading').style.display = 'block';

            const fixPath = leagueId === 'lig1' ? 'fixtures' : 'fixtures_lig2';
            const penPath = leagueId === 'lig1' ? 'penalties' : 'penalties_lig2';
            const activeDefaultFixture = leagueId === 'lig1' ? defaultFixtureData : defaultFixtureDataLig2;

            unsubscribePenalties = onValue(ref(db, penPath), (snapshot) => {
                penaltiesData = snapshot.val() || {};
                renderAll();
            });

            unsubscribeFixtures = onValue(ref(db, fixPath), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    fixtureData = activeDefaultFixture.map((correctMatch, i) => {
                        const dbMatch = data[i];
                        if (dbMatch && (dbMatch.hs !== undefined || dbMatch.as !== undefined || dbMatch.dt !== undefined)) {
                            return { ...correctMatch, hs: dbMatch.hs, as: dbMatch.as, dt: dbMatch.dt };
                        }
                        return correctMatch;
                    });
                } else {
                    fixtureData = JSON.parse(JSON.stringify(activeDefaultFixture));
                    set(ref(db, fixPath), fixtureData); 
                }
                document.getElementById('loading').style.display = 'none';
                
                const activeView = document.querySelector('.view-active');
                if(activeView) {
                    activeView.classList.remove('view-active');
                    void activeView.offsetWidth; 
                    activeView.classList.add('view-active');
                } else if(document.getElementById('main-view').style.display === '') {
                    document.getElementById('main-view').classList.add('view-active');
                }
                
                updateLogoGrid(); 
                renderAll();
            });
        }

            const btn = document.getElementById('league-toggle');
            const title = document.getElementById('league-title');
            const trophy = document.getElementById('trophy-icon');

            if (currentLeague === 'lig1') {
                currentLeague = 'lig2';
                document.body.classList.add('lig2');
                title.innerText = "DiscordToto 2. Lig 2027-2028 Sezonu";
                btn.innerHTML = "<span>🔄</span> 1. LİG'E DÖN";
                trophy.innerText = "🥈";
            } else {
                currentLeague = 'lig1';
                document.body.classList.remove('lig2');
                title.innerText = "DiscordToto 2027-2028 Sezonu";
                btn.innerHTML = "<span>🔄</span> 2. LİG'E GEÇ";
                trophy.innerText = "🏆";
            }
            loadLeagueData(currentLeague);
        }

        window.setScore = function(index, side, val) {
            if(!isAdmin) return;
            const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
            const newValue = val === "" ? null : parseInt(val);
            set(ref(db, `${fixPath}/${index}/${side}`), newValue);
        }
        
        // YENİ: TEKİL MAÇ TARİHİ DEĞİŞTİRME
        window.setMatchDate = function(index, currentDate) {
            if(!isAdmin) return;
            let val = prompt("Maç tarihini/saatini girin (Örn: 12 Mayıs 19:00):", currentDate === 'Tarih Bekleniyor' ? '' : currentDate);
            if(val !== null) {
                const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
                set(ref(db, `${fixPath}/${index}/dt`), val);
            }
        }
        
        // YENİ: HAFTALIK TOPLU TARİH DEĞİŞTİRME
        window.setWeekDate = function(weekNum) {
            if(!isAdmin) return;
            let val = prompt(`${weekNum}. Hafta için toplu tarih/saat girin:\n(Bu haftadaki tüm maçlara uygulanacak)`);
            if(val !== null) {
                const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
                fixtureData.forEach((match, i) => {
                    if(match.w === weekNum) {
                        set(ref(db, `${fixPath}/${i}/dt`), val);
                    }
                });
            }
        }

        window.resetDatabase = function() {
            if(!isAdmin) return;
            if(confirm(`DİKKAT: ${currentLeague === 'lig1' ? '1. Lig' : '2. Lig'} tüm skorlar ve tarihler sıfırlanacak. Emin misin?`)) {
                const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
                const activeDefaultFixture = currentLeague === 'lig1' ? defaultFixtureData : defaultFixtureDataLig2;
                set(ref(db, fixPath), activeDefaultFixture);
                alert("Veritabanı sıfırlandı!");
            }
        }

        window.setPenalty = function(teamName) {
            if(!isAdmin) return;
            const penPath = currentLeague === 'lig1' ? 'penalties' : 'penalties_lig2';
            let current = penaltiesData[teamName] || 0;
            let val = prompt(`${teamName} takımından SİLİNECEK toplam puanı girin:\n(Şu an silinen: ${current})`, current);
            if(val !== null) {
                set(ref(db, `${penPath}/${teamName}`), parseInt(val) || 0);
            }
        }

        function renderAll() {
            const scrollPos = window.scrollY;
            const activeId = document.activeElement ? document.activeElement.id : null;
            const grid = document.getElementById('main-fixture-grid');
            grid.innerHTML = "";
            let currentWeek = 0;
            let weekHtml = "";

            fixtureData.forEach((m, i) => {
                if (m.w !== currentWeek) {
                    if (currentWeek !== 0) { weekHtml += `</div></div>`; grid.innerHTML += weekHtml; }
                    currentWeek = m.w;
                    
                    let adminWeekBtn = isAdmin ? `<button onclick="setWeekDate(${currentWeek})" style="margin-left:auto; background:var(--glass-bg); border:1px solid var(--glass-border); color:#fff; border-radius:8px; cursor:pointer; padding:6px 12px; font-size:0.5em; font-weight:800; text-transform:uppercase; transition:all 0.3s; backdrop-filter:blur(5px);">📅 Haftayı Düzenle</button>` : '';
                    
                    weekHtml = `<div class="week-card"><div class="week-header"><span class="week-number">${currentWeek}</span><span class="week-label">Hafta</span>${adminWeekBtn}</div><div class="match-list">`;
                }
                
                let hData = getTeamData(m.h);
                let aData = getTeamData(m.a);
                let center = isAdmin ? `<input type="number" id="hs-${i}" class="score-input" value="${m.hs ?? ''}" oninput="setScore(${i},'hs',this.value)"> <span class="vs">-</span> <input type="number" id="as-${i}" class="score-input" value="${m.as ?? ''}" oninput="setScore(${i},'as',this.value)">` : `<span class="vs">${(m.hs != null && m.as != null) ? m.hs + ' - ' + m.as : 'VS'}</span>`;
                
                let matchDate = m.dt ? m.dt : 'Tarih Bekleniyor';
                let adminMatchDateBtn = isAdmin ? `<span onclick="setMatchDate(${i}, '${matchDate}')" style="cursor:pointer; margin-left:5px; background:rgba(255,255,255,0.2); padding:2px 6px; border-radius:4px; font-size:0.9em;" title="Tarihi Düzenle">✏️</span>` : '';
                
                weekHtml += `
                <div class="match-row">
                    <div class="match-teams">
                        <div class="team-box home">
                            <img src="${hData.logo}" class="mini-logo" onerror="this.style.opacity='0'">
                            <span>${hData.name}</span>
                        </div>
                        <div class="match-score">${center}</div>
                        <div class="team-box away">
                            <span>${aData.name}</span>
                            <img src="${aData.logo}" class="mini-logo" onerror="this.style.opacity='0'">
                        </div>
                    </div>
                    <div class="match-stadium-mini">
                        📅 ${matchDate} ${adminMatchDateBtn} <span style="margin:0 10px; opacity:0.5;">|</span> 🏟️ ${hData.stadium}
                    </div>
                </div>`;
                
                if (i === fixtureData.length - 1) { weekHtml += `</div></div>`; grid.innerHTML += weekHtml; }
            });

            let statsMap = {};
            teamDetails.forEach(t => { statsMap[t.name] = { name: t.name, logo: t.logo, om:0, g:0, b:0, m:0, ag:0, yg:0, av:0, p:0 }; });
            
            fixtureData.forEach(m => {
                if (m.hs != null && m.as != null) {
                    let hData = getTeamData(m.h);
                    let aData = getTeamData(m.a);
                    let h = statsMap[hData.name]; let a = statsMap[aData.name];
                    if(h && a) {
                        h.om++; a.om++; h.ag += parseInt(m.hs); h.yg += parseInt(m.as); a.ag += parseInt(m.as); a.yg += parseInt(m.hs);
                        if (m.hs > m.as) { h.g++; h.p += 3; a.m++; } else if (m.as > m.hs) { a.g++; a.p += 3; h.m++; } else { h.b++; h.p++; a.b++; a.p++; }
                        h.av = h.ag - h.yg; a.av = a.ag - a.yg;
                    }
                }
            });

            Object.keys(penaltiesData).forEach(team => {
                if(statsMap[team]) statsMap[team].p -= parseInt(penaltiesData[team]);
            });

            let activeTeams = Object.values(statsMap).filter(t => t.om > 0 || fixtureData.some(m => getTeamData(m.h).name === t.name || getTeamData(m.a).name === t.name));
            let sortedStats = activeTeams.sort((a, b) => b.p - a.p || b.av - a.av || b.ag - a.ag);
            
            document.getElementById('standings-body').innerHTML = sortedStats.map((t, i) => {
                const rank = i + 1;
                let barColor = "transparent";
                let rowBg = "transparent";
                
                if (currentLeague === 'lig1') {
                    if (rank === 1) { barColor = "#f1c40f"; rowBg = "rgba(241, 196, 15, 0.2)"; }
                    else if (rank === 2) { barColor = "#3498db"; rowBg = "rgba(52, 152, 219, 0.2)"; }
                    else if (rank === 3) { barColor = "#e67e22"; rowBg = "rgba(230, 126, 34, 0.2)"; }
                    else if (rank === 4) { barColor = "#2ecc71"; rowBg = "rgba(46, 204, 113, 0.2)"; }
                    else if (rank > sortedStats.length - 3) { barColor = "#e74c3c"; rowBg = "rgba(231, 76, 60, 0.2)"; }
                } else {
                    if (rank === 1) { barColor = "#2ecc71"; rowBg = "rgba(46, 204, 113, 0.2)"; }
                    else if (rank === 2 || rank === 3) { barColor = "#27ae60"; rowBg = "rgba(39, 174, 96, 0.2)"; }
                    else if (rank >= 4 && rank <= 7) { barColor = "#1abc9c"; rowBg = "rgba(26, 188, 156, 0.2)"; }
                    else if (rank > sortedStats.length - 4) { barColor = "#e74c3c"; rowBg = "rgba(231, 76, 60, 0.2)"; }
                }

                const penaltyBtn = isAdmin ? `<br><span onclick="setPenalty('${t.name}')" style="cursor:pointer; color:#ffb8b8; font-size:0.75em; background:rgba(231, 76, 60, 0.6); padding:2px 6px; border-radius:6px; margin-top:6px; display:inline-block;">[SİL: ${penaltiesData[t.name] || 0}]</span>` : "";

                return `<tr style="background-color: ${rowBg}; box-shadow: inset 6px 0 0 0 ${barColor};">
                    <td>${rank}</td>
                    <td style="text-align:left; display:flex; align-items:center; gap: 15px;">
                        <img src="${t.logo}" style="width:36px; height:36px; object-fit:contain; cursor:pointer; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));" onclick="showTeam('${t.name}')">
                        <div>${t.name}${penaltyBtn}</div>
                    </td>
                    <td>${t.om}</td><td>${t.g}</td><td>${t.b}</td><td>${t.m}</td><td>${t.av}</td>
                    <td style="color:#fff;">${t.p}</td>
                </tr>`;
            }).join('');

            let legendHtml = '';
            if (currentLeague === 'lig1') {
                legendHtml = `
                    <div class="legend-box">
                        <div class="legend-item"><div class="color-dot" style="background:#f1c40f;"></div> Şampiyon</div>
                        <div class="legend-item"><div class="color-dot" style="background:#3498db;"></div> Şampiyonlar Ligi</div>
                        <div class="legend-item"><div class="color-dot" style="background:#e67e22;"></div> Avrupa Ligi</div>
                        <div class="legend-item"><div class="color-dot" style="background:#2ecc71;"></div> Konferans Ligi</div>
                        <div class="legend-item"><div class="color-dot" style="background:#e74c3c;"></div> Küme Düşme</div>
                    </div>`;
            } else {
                legendHtml = `
                    <div class="legend-box">
                        <div class="legend-item"><div class="color-dot" style="background:#2ecc71;"></div> Süper Lig'e Yükselme</div>
                        <div class="legend-item"><div class="color-dot" style="background:#27ae60;"></div> Play-Off Finali</div>
                        <div class="legend-item"><div class="color-dot" style="background:#1abc9c;"></div> Play-Off</div>
                        <div class="legend-item"><div class="color-dot" style="background:#e74c3c;"></div> Küme Düşme</div>
                    </div>`;
            }
            document.getElementById('table-legend').innerHTML = legendHtml;

            window.scrollTo(0, scrollPos);
            if(activeId) { document.getElementById(activeId)?.focus(); }
        }

        window.showTeam = function(name) {
            let tData = getTeamData(name);
            
            document.getElementById('team-view-header-content').innerHTML = `
                <img src="${tData.logo}" class="team-header-logo" onerror="this.style.display='none'">
                <h2 class="team-name-big">${tData.name}</h2>
                <div class="team-header-stadium">🏟️ ${tData.stadium}</div>
            `;

            const teamMatches = fixtureData.filter(m => getTeamData(m.h).name === name || getTeamData(m.a).name === name);
            document.getElementById('team-fixture-list').innerHTML = teamMatches.map(m => {
                const isHome = getTeamData(m.h).name === name; 
                const opponent = isHome ? m.a : m.h; 
                const oppData = getTeamData(opponent);
                const icon = isHome ? "🏠" : "✈️";
                let matchDate = m.dt ? m.dt : 'Tarih Bekleniyor';
                let displayContent = (m.hs != null && m.as != null) ? `<span style="display:inline-block; width:35px; height:35px; line-height:35px; background:${((isHome && m.hs>m.as)||(!isHome && m.as>m.hs))?'rgba(46, 204, 113, 0.9)':(m.hs==m.as?'rgba(149, 165, 166, 0.9)':'rgba(231, 76, 60, 0.9)')}; color:#fff; border-radius:8px; text-align:center; font-weight:800; font-size: 1.1em; box-shadow: var(--shadow-glass);">${(m.hs==m.as?'B':((isHome && m.hs>m.as)||(!isHome && m.as>m.hs)?'G':'M'))}</span>` : `<span style="color:var(--text-sub); font-weight:800; font-size:1.1em;">VS</span>`;
                
                return `
                <div class="gs-match-card">
                    <div class="card-left">
                        <div class="week-badge">${m.w}.H</div>
                        <div class="location-icon">${icon}</div>
                        <img src="${oppData.logo}" style="width:36px; height:36px; object-fit:contain; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));" onerror="this.style.opacity='0'">
                        <div style="display:flex; flex-direction:column;">
                            <div class="match-details">${oppData.name}</div>
                            <div style="font-size:0.75em; color:var(--text-sub); margin-top:4px;">📅 ${matchDate}</div>
                        </div>
                    </div>
                    <div class="stadium-info-list">
                        ${displayContent}
                    </div>
                </div>`;
            }).join('');
            showView('team');
        }

        window.showView = function(view, el) {
            ['main-view', 'standings-view', 'team-view'].forEach(id => {
                document.getElementById(id).classList.remove('view-active');
                document.getElementById(id).style.display = 'none';
            });
            
            if(el) { 
                document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); 
                el.classList.add('active'); 
            }
            
            const targetView = document.getElementById(view + '-view');
            targetView.style.display = 'block';
            
            void targetView.offsetWidth; 
            targetView.classList.add('view-active');
            
            document.querySelector('.team-selector-container').style.display = (view === 'standings') ? 'none' : 'block';
        }

        window.showMainView = function() { showView('main', document.querySelector('.top-controls .control-btn:nth-child(2)')); }

        window.toggleAdmin = function() {
            if (isAdmin) { isAdmin = false; } 
            else { let input = prompt("Yönetici Şifresi:"); if (input === ADMIN_PASSWORD) isAdmin = true; else { alert("Yanlış Şifre!"); return; } }
            const btn = document.getElementById('admin-toggle');
            btn.innerHTML = isAdmin ? "<span>⚙️</span> DÜZENLEME AÇIK" : "<span>⚙️</span> YÖNETİCİ";
            btn.classList.toggle('on', isAdmin);
            document.getElementById('reset-db-btn').style.display = isAdmin ? 'flex' : 'none';
            renderAll();
        }

        loadLeagueData(currentLeague);

    </script>
</body>
</html>
