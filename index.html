        /* TEMEL DEĞİŞKENLER VE LİG TEMALARI */
        :root {
            /* Lig 1 (Pembe Tema) - Varsayılan */
            --accent-main: #ed1e79;
            --accent-hover: #f34494;
            --accent-light: #f96bb0;
            --accent-fade: rgba(237, 30, 121, 0.15);
            
            /* Gündüz Modu Renkleri */
            --bg-color: #f4f7f6;
            --card-bg-transparent: rgba(255, 255, 255, 0.6);
            --text-dark: #2c3e50;
            --text-stadium: #7f8c8d;
            --card-border: rgba(255, 255, 255, 0.5);
            --shadow-color: rgba(31, 38, 135, 0.1);
            --team-c1: var(--text-dark);
        }

        /* Lig 2 (Mavi Tema) */
        body.lig2 {
            --accent-main: #05217a;
            --accent-hover: #054a96;
            --accent-light: #0473b2;
            --accent-fade: rgba(5, 33, 122, 0.15);
        }

        /* Karanlık Mod (Dark Mode) */
        body.dark-mode {
            --bg-color: #0f172a;
            --card-bg-transparent: rgba(30, 41, 59, 0.7);
            --text-dark: #f8fafc;
            --text-stadium: #94a3b8;
            --card-border: rgba(255, 255, 255, 0.05);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --team-c1: #ffffff;
        }

        /* GENEL STİLLER VE BALONCUK EFEKTİ */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--accent-fade) 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0; padding: 20px 15px 200px 15px;
            color: var(--text-dark);
            min-height: 100vh; display: flex; flex-direction: column;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Üst Menü ve Kontroller */
        .top-controls {
            display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;
            margin-bottom: 20px; z-index: 3000;
        }

        .control-btn {
            padding: 10px 20px; border-radius: 25px; background: var(--card-bg-transparent); 
            border: 2px solid var(--accent-main); cursor: pointer; font-weight: 800; 
            color: var(--accent-main); backdrop-filter: blur(10px);
            transition: all 0.3s ease; box-shadow: 0 4px 15px var(--shadow-color);
        }
        .control-btn:hover { background: var(--accent-main); color: white; transform: translateY(-2px); }
        .control-btn.active { background: var(--accent-main); color: white; }

        .icon-btn {
            width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 1.2em;
            background: var(--card-bg-transparent); color: var(--text-dark); cursor: pointer;
            backdrop-filter: blur(10px); box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.3s, background 0.3s;
        }
        .icon-btn:hover { transform: scale(1.1); background: var(--accent-fade); }

        #admin-toggle.on { background: #2ecc71; border-color: #2ecc71; color: white;}
        #reset-db-btn { display: none; background: #e74c3c; border-color: #e74c3c; color: white; }

        h1.main-title {
            text-align: center; color: var(--accent-main); font-weight: 800;
            font-size: 2.5em; margin-bottom: 30px; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 4px 15px var(--accent-fade);
            transition: color 0.5s ease;
        }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-main); color: white; padding: 20px 40px; border-radius: 30px; font-weight: 800; z-index: 9999; box-shadow: 0 10px 30px var(--accent-fade); }

        /* GÖRÜNÜMLER */
        #main-view, #standings-view, #team-view { display: none; animation: fadeIn 0.6s ease; }

        /* FİKSTÜR KARTLARI (GLASSMORPHISM) */
        .fixture-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px; max-width: 1400px; margin: 0 auto 100px auto;
        }
        .week-card {
            background: var(--card-bg-transparent); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; padding: 20px; box-shadow: 0 8px 32px 0 var(--shadow-color);
            border: 1px solid var(--card-border); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease;
        }
        .week-card:hover { transform: translateY(-5px); border-color: var(--accent-main); box-shadow: 0 15px 35px var(--accent-fade); }
        .week-header { display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px dashed var(--accent-fade); }
        .week-number { font-size: 2em; font-weight: 800; color: var(--accent-main); margin-right: 10px; line-height: 1;}
        .week-label { font-size: 1.1em; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(128,128,128,0.1); font-size: 0.95em; }
        .match-row:last-child { border-bottom: none; }
        .match-info { flex: 3; font-weight: 800; display: flex; align-items: center; flex-wrap: wrap;}
        .stadium-info { flex: 2; text-align: right; font-size: 0.75em; color: var(--text-stadium); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-weight: 600;}
        
        .vs { color: var(--accent-light); margin: 0 8px; font-weight: 800; font-size: 1.2em;}
        .score-input { width: 45px; text-align: center; font-weight: 800; border: 2px solid var(--accent-fade); border-radius: 8px; margin: 0 4px; padding: 5px; font-size: 1em; background: var(--bg-color); color: var(--text-dark); transition: border-color 0.3s;}
        .score-input:focus { border-color: var(--accent-main); outline: none; }

        /* ALT LOGO SEÇİCİ */
        .team-selector-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 10px; background: var(--card-bg-transparent);
            border-radius: 30px 30px 0 0; border-top: 1px solid var(--card-border);
            box-shadow: 0 -10px 40px var(--shadow-color); text-align: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 2000;
            max-height: 35vh; overflow-y: auto;
        }
        .logo-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .team-logo-btn {
            width: 55px; height: 55px; background-color: var(--bg-color);
            border: 2px solid transparent; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px var(--shadow-color);
            background-size: 65%; background-position: center; background-repeat: no-repeat;
        }
        .team-logo-btn:hover, .team-logo-btn.active {
            border-color: var(--accent-main); transform: translateY(-5px) scale(1.1); box-shadow: 0 10px 25px var(--accent-fade);
        }

        /* PUAN DURUMU */
        .standings-container { max-width: 1000px; margin: 0 auto; background: var(--card-bg-transparent); backdrop-filter: blur(15px); padding: 25px; border-radius: 24px; border: 1px solid var(--card-border); overflow-x: auto; box-shadow: 0 8px 32px var(--shadow-color); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
        th { padding: 15px; color: var(--accent-main); border-bottom: 2px dashed var(--accent-fade); font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;}
        td { padding: 12px; border-bottom: 1px solid rgba(128,128,128,0.1); font-weight: 700; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        @media (max-width: 768px) {
            h1.main-title { font-size: 1.6em; }
            .fixture-container { grid-template-columns: 1fr; gap: 20px;}
            .team-logo-btn { width: 45px; height: 45px; }
            .score-input { width: 35px; padding: 3px; }
        }
    </style>
</head>

        // DİNAMİK LOGO MENÜSÜ GÜNCELLEYİCİ
        function updateLogoGrid() {
            // Fikstürdeki aktif takımları bul
            const activeTeams = new Set();
            fixtureData.forEach(m => { activeTeams.add(m.h); activeTeams.add(m.a); });

            const gridHtml = teamDetails
                .filter(t => activeTeams.has(t.name))
                .sort((a,b) => a.name.localeCompare(b.name))
                .map(t => `<div class="team-logo-btn" style="background-image:url('${t.logo}')" onclick="showTeam('${t.name}')" title="${t.name}"></div>`)
                .join('');
            
            document.getElementById('logo-grid').innerHTML = gridHtml;
        }

        function loadLeagueData(leagueId) {
            if (unsubscribeFixtures) unsubscribeFixtures();
            if (unsubscribePenalties) unsubscribePenalties();

            document.getElementById('loading').style.display = 'block';

            const fixPath = leagueId === 'lig1' ? 'fixtures' : 'fixtures_lig2';
            const penPath = leagueId === 'lig1' ? 'penalties' : 'penalties_lig2';

            unsubscribePenalties = onValue(ref(db, penPath), (snapshot) => {
                penaltiesData = snapshot.val() || {};
                renderAll();
            });

            unsubscribeFixtures = onValue(ref(db, fixPath), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    fixtureData = defaultFixtureData.map((correctMatch, i) => {
                        const dbMatch = data[i];
                        if (dbMatch && (dbMatch.hs !== undefined || dbMatch.as !== undefined)) {
                            return { ...correctMatch, hs: dbMatch.hs, as: dbMatch.as };
                        }
                        return correctMatch;
                    });
                } else {
                    fixtureData = JSON.parse(JSON.stringify(defaultFixtureData));
                    set(ref(db, fixPath), fixtureData);
                }
                document.getElementById('loading').style.display = 'none';
                if(document.getElementById('main-view').style.display === '') {
                    document.getElementById('main-view').style.display = 'block';
                }
                updateLogoGrid(); // Sadece aktif ligin takımlarını aşağıya diz
                renderAll();
            });
        }

        window.toggleLeague = function() {
            const btn = document.getElementById('league-toggle');
            const title = document.getElementById('league-title');

            if (currentLeague === 'lig1') {
                currentLeague = 'lig2';
                document.body.classList.add('lig2');
                title.innerText = "DiscordToto 2. Lig 2027-2028 Sezonu";
                btn.innerText = "🔄 2. LİG (AKTİF)";
            } else {
                currentLeague = 'lig1';
                document.body.classList.remove('lig2');
                title.innerText = "DiscordToto 2027-2028 Sezonu";
                btn.innerText = "🔄 1. LİG (AKTİF)";
            }
            loadLeagueData(currentLeague);
        }

        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
        }

        window.setScore = function(index, side, val) {
            if(!isAdmin) return;
            const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
            const newValue = val === "" ? null : parseInt(val);
            set(ref(db, `${fixPath}/${index}/${side}`), newValue);
        }

        window.resetDatabase = function() {
            if(!isAdmin) return;
            if(confirm(`DİKKAT: ${currentLeague === 'lig1' ? '1. Lig' : '2. Lig'} tüm skorlar sıfırlanacak. Emin misin?`)) {
                const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
                set(ref(db, fixPath), defaultFixtureData);
                alert("Veritabanı sıfırlandı!");
            }
        }

        window.setPenalty = function(teamName) {
            if(!isAdmin) return;
            const penPath = currentLeague === 'lig1' ? 'penalties' : 'penalties_lig2';
            let current = penaltiesData[teamName] || 0;
            let val = prompt(`${teamName} takımından SİLİNECEK toplam puanı girin:\n(Şu an silinen: ${current})`, current);
            if(val !== null) {
                set(ref(db, `${penPath}/${teamName}`), parseInt(val) || 0);
            }
        }

        function renderAll() {
            const scrollPos = window.scrollY;
            const activeId = document.activeElement ? document.activeElement.id : null;
            const grid = document.getElementById('main-fixture-grid');
            grid.innerHTML = "";
            let currentWeek = 0;
            let weekHtml = "";

            fixtureData.forEach((m, i) => {
                if (m.w !== currentWeek) {
                    if (currentWeek !== 0) { weekHtml += `</div></div>`; grid.innerHTML += weekHtml; }
                    currentWeek = m.w;
                    weekHtml = `<div class="week-card"><div class="week-header"><span class="week-number">${currentWeek}</span><span class="week-label">Hafta</span></div><div class="match-list">`;
                }
                let center = isAdmin ? `<div style="display:flex;justify-content:center;align-items:center"><input type="number" id="hs-${i}" class="score-input" value="${m.hs ?? ''}" oninput="setScore(${i},'hs',this.value)"> <span class="vs">-</span> <input type="number" id="as-${i}" class="score-input" value="${m.as ?? ''}" oninput="setScore(${i},'as',this.value)"></div>` : `<span class="vs">${(m.hs != null && m.as != null) ? m.hs + ' - ' + m.as : 'VS'}</span>`;
                // STADYUM OTOMATİK OLARAK ÇEKİLİYOR: getStadium(m.h)
                weekHtml += `<div class="match-row"><div class="match-info" style="justify-content:flex-start; flex:1;">${m.h}</div><div style="flex:0 0 100px; text-align:center;">${center}</div><div class="match-info" style="justify-content:flex-end; flex:1;">${m.a}</div><div class="stadium-info">${getStadium(m.h)}</div></div>`;
                if (i === fixtureData.length - 1) { weekHtml += `</div></div>`; grid.innerHTML += weekHtml; }
            });

            let statsMap = {};
            teamDetails.forEach(t => { statsMap[t.name] = { name: t.name, logo: t.logo, om:0, g:0, b:0, m:0, ag:0, yg:0, av:0, p:0 }; });
            
            fixtureData.forEach(m => {
                if (m.hs != null && m.as != null) {
                    let h = statsMap[m.h]; let a = statsMap[m.a];
                    if(h && a) {
                        h.om++; a.om++; h.ag += parseInt(m.hs); h.yg += parseInt(m.as); a.ag += parseInt(m.as); a.yg += parseInt(m.hs);
                        if (m.hs > m.as) { h.g++; h.p += 3; a.m++; } else if (m.as > m.hs) { a.g++; a.p += 3; h.m++; } else { h.b++; h.p++; a.b++; a.p++; }
                        h.av = h.ag - h.yg; a.av = a.ag - a.yg;
                    }
                }
            });

            Object.keys(penaltiesData).forEach(team => {
                if(statsMap[team]) statsMap[team].p -= parseInt(penaltiesData[team]);
            });

            // SADECE MAÇI OLAN (AKTİF) TAKIMLARI LİSTELE
            let activeTeams = Object.values(statsMap).filter(t => t.om > 0 || fixtureData.some(m => m.h === t.name || m.a === t.name));
            let sortedStats = activeTeams.sort((a, b) => b.p - a.p || b.av - a.av || b.ag - a.ag);
            
            document.getElementById('standings-body').innerHTML = sortedStats.map((t, i) => {
                const rank = i + 1;
                let barColor = "transparent";
                if (rank <= 2) barColor = "#2ecc71"; else if (rank <= 4) barColor = "#f39c12"; else if (rank > sortedStats.length - 3) barColor = "#e74c3c";
                
                const penaltyBtn = isAdmin ? `<br><span onclick="setPenalty('${t.name}')" style="cursor:pointer; color:#e74c3c; font-size:0.6em; border:1px solid #e74c3c; padding:2px; border-radius:4px;">[PUAN SİL: ${penaltiesData[t.name] || 0}]</span>` : "";

                return `<tr style="box-shadow: inset 5px 0 0 0 ${barColor};">
                    <td>${rank}</td>
                    <td style="text-align:left; display:flex; align-items:center;">
                        <div class="team-logo-btn" style="width:40px; height:40px; margin-right:15px; border:none; background-image:url('${t.logo}'); background-color:rgba(128,128,128,0.1);" onclick="showTeam('${t.name}')"></div>
                        <div>${t.name}${penaltyBtn}</div>
                    </td>
                    <td>${t.om}</td><td>${t.g}</td><td>${t.b}</td><td>${t.m}</td><td>${t.av}</td>
                    <td style="color:var(--accent-main); font-weight:800;">${t.p}</td>
                </tr>`;
            }).join('');

            window.scrollTo(0, scrollPos);
            if(activeId) { const el = document.getElementById(activeId); if(el) el.focus(); }
        }

        window.showTeam = function(name) {
            document.getElementById('selected-team-name').innerText = name;
            const teamMatches = fixtureData.filter(m => m.h === name || m.a === name);
            document.getElementById('team-fixture-list').innerHTML = teamMatches.map(m => {
                const isHome = m.h === name; const opponent = isHome ? m.a : m.h; const icon = isHome ? "🏠" : "✈️";
                let displayContent = (m.hs != null && m.as != null) ? `<span style="display:inline-block; width:35px; height:35px; line-height:35px; background:${((isHome && m.hs>m.as)||(!isHome && m.as>m.hs))?'#2ecc71':(m.hs==m.as?'#95a5a6':'#e74c3c')}; color:white; border-radius:8px; text-align:center; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">${(m.hs==m.as?'B':((isHome && m.hs>m.as)||(!isHome && m.as>m.hs)?'G':'M'))}</span>` : `<span style="color:#aaa; font-weight:bold; font-size:0.9em;">VS</span>`;
                // STADYUM OTOMATİK OLARAK ÇEKİLİYOR: getStadium(m.h)
                return `<div class="week-card gs-match-card" style="padding:15px; margin-bottom:15px;"><div class="card-left"><div class="week-badge" style="background:var(--accent-main); color:white; padding:6px; margin-right:12px; border-radius:8px;">${m.w}.</div><div class="location-icon" style="margin-right:12px;">${icon}</div><div class="match-details" style="flex:1;">${opponent}</div></div><div class="stadium-info-list" style="display:flex; align-items:center;"><span class="stadium-icon">🏟️</span> <span style="font-size:0.8em; margin-right:15px; max-width:140px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${getStadium(m.h)}</span>${displayContent}</div></div>`;
            }).join('');
            showView('team');
        }

        window.showView = function(view, el) {
            ['main-view', 'standings-view', 'team-view'].forEach(id => document.getElementById(id).style.display = 'none');
            if(el) { document.querySelectorAll('.control-btn').forEach(btn => { if(btn.innerText.includes('FİKSTÜR') || btn.innerText.includes('PUAN')) btn.classList.remove('active'); }); el.classList.add('active'); }
            document.getElementById(view + '-view').style.display = 'block';
            document.querySelector('.team-selector-container').style.display = (view === 'standings') ? 'none' : 'block';
        }

        window.showMainView = function() { showView('main', document.querySelector('.control-btn:nth-child(3)')); }

        window.toggleAdmin = function() {
            if (isAdmin) { isAdmin = false; } 
            else { let input = prompt("Yönetici Şifresi:"); if (input === ADMIN_PASSWORD) isAdmin = true; else { alert("Yanlış Şifre!"); return; } }
            const btn = document.getElementById('admin-toggle');
            btn.innerText = isAdmin ? "⚙️ DÜZENLEME AÇIK" : "⚙️ YÖNETİCİ";
            btn.classList.toggle('on', isAdmin);
            document.getElementById('reset-db-btn').style.display = isAdmin ? 'inline-block' : 'none';
            renderAll();
        }

        loadLeagueData(currentLeague);

    </script>
</body>
</html>
