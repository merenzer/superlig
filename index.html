<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscordToto Fikstür</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        /* --- PREMİUM DARK TEMA VE DEĞİŞKENLER --- */
        :root {
            /* Lig 1 (Neon Pembe) */
            --accent-main: #ff1f87; /* Daha canlı neon pembe */
            --accent-hover: #ff71b7;
            --accent-fade: rgba(255, 31, 135, 0.1);
            --accent-glow: 0 0 15px rgba(255, 31, 135, 0.3);
            
            /* Derin Dark Arka Plan (Referanslardaki gibi) */
            --bg-color: #05070a; 
            --bg-gradient: radial-gradient(circle at 50% 30%, #1a2235 0%, #05070a 70%); /* Hafif üstten aydınlatmalı derinlik */
            
            /* Sleek Kart Tasarımı (Dark Translucent) */
            --card-bg: rgba(20, 25, 35, 0.7); 
            --card-border: rgba(240, 246, 252, 0.06); /* Çok ince kenarlık */
            
            /* Yazı Renkleri (Premium Light) */
            --text-main: #f0f6fc; /* Tam beyaz değil, mat beyaz */
            --text-sub: #8b949e; /* Mat gri */
            --shadow-premium: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Lig 2 (Neon Mavi - Referans Odaklı) */
        body.lig2 {
            --accent-main: #33b5ff; /* Elektrik mavisi */
            --accent-hover: #80d4ff;
            --accent-fade: rgba(51, 181, 255, 0.1);
            --accent-glow: 0 0 15px rgba(51, 181, 255, 0.3);
            
            /* Lig 2'ye özel hafif mavi background ışıltısı */
            --bg-gradient: radial-gradient(circle at 50% 30%, #102a4a 0%, #05070a 70%);
        }

        /* --- GENEL AYARLAR --- */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            margin: 0; padding: 20px 15px 200px 15px;
            color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column;
            transition: background 0.5s ease;
            background-attachment: fixed; /* Background gradyanı sabit kalsın derinlik için */
        }

        /* --- ÜST MENÜ VE KONTROLLER (SLEEK) --- */
        .top-controls {
            display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 30px; z-index: 3000;
        }

        .control-btn {
            padding: 9px 20px; border-radius: 8px; /* Daha köşeli sleek butonlar */
            background: var(--card-bg); 
            border: 1px solid var(--card-border); cursor: pointer; font-weight: 700; font-size: 0.8em;
            color: var(--text-main); backdrop-filter: blur(10px); text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .control-btn:hover { border-color: var(--accent-main); box-shadow: var(--accent-glow); color: var(--accent-main); transform: translateY(-1px); }
        .control-btn.active { background: var(--accent-main); color: #000; border-color: var(--accent-main); box-shadow: var(--accent-glow); font-weight: 800; }

        .icon-btn {
            width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--card-border); font-size: 1.1em;
            background: var(--card-bg); color: var(--text-main); cursor: pointer;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .icon-btn:hover { border-color: var(--accent-main); box-shadow: var(--accent-glow); color: var(--accent-main); }

        #admin-toggle.on { background: #2ecc71; border-color: #2ecc71; color: #000;}
        #reset-db-btn { display: none; background: #e74c3c; border-color: #e74c3c; color: #fff; margin-left: 10px;}

        h1.main-title {
            text-align: center; color: var(--text-main); font-weight: 800;
            font-size: 2em; margin-bottom: 35px; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: var(--accent-glow); /* Başlıkta neon parlama */
            transition: color 0.5s ease;
        }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-main); color: #000; padding: 15px 35px; border-radius: 8px; font-weight: 800; z-index: 9999; box-shadow: var(--accent-glow); text-transform: uppercase; font-size: 0.9em;}

        #main-view, #standings-view, #team-view { display: none; animation: fadeIn Sleek 0.5s ease; }

        /* --- FİKSTÜR KARTLARI (SLEEK DARK) --- */
        .fixture-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto 100px auto;
        }
        .week-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 12px; padding: 18px; box-shadow: var(--shadow-premium);
            border: 1px solid var(--card-border); transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        /* Kartın üstüne ince neon çizgi (Referanslardaki gibi) */
        .week-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent-main); opacity: 0.5;
        }

        .week-card:hover { transform: translateY(-3px) scale(1.01); border-color: rgba(240, 246, 252, 0.15); box-shadow: 0 15px 40px rgba(0,0,0,0.6), var(--accent-glow); }
        
        .week-header { display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--card-border); }
        .week-number { font-size: 1.8em; font-weight: 800; color: var(--accent-main); margin-right: 10px; line-height: 1; text-shadow: var(--accent-glow);}
        .week-label { font-size: 0.9em; font-weight: 700; text-transform: uppercase; color: var(--text-main); letter-spacing: 1px;}
        
        .match-row { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; border-bottom: 1px solid rgba(240, 246, 252, 0.03); }
        .match-row:last-child { border-bottom: none; padding-bottom: 0;}
        
        .match-teams { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        
        .team-box { display: flex; align-items: center; gap: 10px; flex: 1; font-weight: 700; font-size: 0.85em; color: var(--text-main); }
        .team-box.home { justify-content: flex-start; text-align: left; }
        .team-box.away { justify-content: flex-end; text-align: right; }
        
        /* --- LOGO DÜZELTME: Pixelated kaldırıldı, Object-fit eklendi --- */
        .mini-logo { 
            width: 24px; height: 24px; object-fit: contain; /* Büyük logoyu sığdırır */
            /* image-rendering KODLARI SİLİNDİ - YUMUŞAK GEÇİŞ İÇİN */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3)); /* Logoya hafif derinlik */
        }
        
        .match-score { flex: 0 0 auto; text-align: center; margin: 0 8px; min-width: 60px;}
        .vs { color: var(--text-sub); font-weight: 700; font-size: 1em; opacity: 0.8;}
        .score-input { width: 32px; text-align: center; font-weight: 800; border: 1px solid var(--card-border); border-radius: 4px; margin: 0 2px; padding: 5px; font-size: 0.9em; background: rgba(0,0,0,0.3); color: var(--text-main); transition: border-color 0.3s;}
        .score-input:focus { border-color: var(--accent-main); outline: none; box-shadow: var(--accent-glow); }

        .match-stadium-mini { font-size: 0.7em; color: var(--text-sub); margin-top: 9px; font-weight: 600; text-align: center; opacity: 0.8; }

        /* --- TAKIM DETAY SAYFASI (PREMİUM) --- */
        .team-header-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 35px; background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--card-border); box-shadow: var(--shadow-premium); }
        
        /* Logo Düzeltme */
        .team-header-logo { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(var(--accent-glow)); /* Logoya neon ışıltı */ }
        
        .team-name-big { font-size: 2.2em; font-weight: 800; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; margin: 0; text-align: center; text-shadow: var(--shadow-premium); }
        .team-header-stadium { font-size: 0.9em; color: var(--text-sub); font-weight: 600; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 6px 18px; border-radius: 4px; border: 1px solid var(--card-border); text-transform: uppercase; letter-spacing: 1px;}
        
        .gs-match-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 12px; border: 1px solid var(--card-border); box-shadow: var(--shadow-premium);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; margin-bottom: 12px; transition: all 0.3s ease;
        }
        .gs-match-card:hover { border-color: rgba(240, 246, 252, 0.15); transform: translateX(3px); }
        .card-left { display: flex; align-items: center; flex: 2; gap: 12px;}
        .week-badge { background-color: rgba(0,0,0,0.4); color: var(--accent-main); font-weight: 800; padding: 6px 10px; border-radius: 4px; min-width: 25px; text-align: center; font-size: 0.85em; border: 1px solid var(--card-border); }
        .location-icon { font-size: 1.2em; opacity: 0.7; }
        .match-details { font-size: 1em; font-weight: 700; color: var(--text-main); }
        .stadium-info-list { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 12px;}

        /* --- ALT LOGO SEÇİCİ (SLEEK) --- */
        .team-selector-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 18px 10px; background: rgba(13, 17, 27, 0.9); /* Daha koyu alt menü */
            border-radius: 16px 16px 0 0; border-top: 1px solid var(--card-border);
            box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.6); text-align: center;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 2000;
            max-height: 28vh; overflow-y: auto;
        }
        .logo-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        
        /* Logo Düzeltme ve Sleek Buton */
        .team-logo-btn {
            width: 52px; height: 52px; background-color: #000;
            border: 1px solid var(--card-border); border-radius: 8px; /* Köşeli sleek */
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow-premium);
            background-size: 70%; background-position: center; background-repeat: no-repeat;
            /* image-rendering SİLİNDİ */
        }
        .team-logo-btn:hover, .team-logo-btn.active {
            border-color: var(--accent-main); transform: translateY(-5px) scale(1.1); box-shadow: var(--accent-glow);
        }

        /* --- PUAN DURUMU (SLEEK TABLE) --- */
        .standings-container { max-width: 900px; margin: 0 auto; background: var(--card-bg); backdrop-filter: blur(20px); padding: 15px; border-radius: 12px; border: 1px solid var(--card-border); overflow-x: auto; box-shadow: var(--shadow-premium); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
        th { padding: 15px; color: var(--text-sub); border-bottom: 1px solid var(--card-border); font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        td { padding: 12px; border-bottom: 1px solid rgba(240, 246, 252, 0.02); font-weight: 700; vertical-align: middle; font-size: 0.95em; color: var(--text-main);}
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255,255,255,0.02); } /* Satır hover efekti */

        /* Puan sütununu neon renkle vurgula (Referans gibi) */
        td:last-child { color: var(--accent-main); font-weight: 800; text-shadow: var(--accent-glow); }

        @keyframes fadeInSleek { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) {
            h1.main-title { font-size: 1.4em; }
            .fixture-container { grid-template-columns: 1fr; gap: 15px;}
            .team-logo-btn { width: 44px; height: 44px; }
            .team-name-big { font-size: 1.6em; }
            .team-header-logo { width: 70px; height: 70px; }
            .gs-match-card { flex-direction: column; align-items: flex-start; gap: 12px; padding: 15px;}
            .stadium-info-list { width: 100%; justify-content: space-between; flex-direction: row-reverse;}
            th, td { padding: 10px 5px; font-size: 0.8em; }
        }
    </style>
</head>
<body>

        <button class="control-btn active" onclick="showView('main', this)">📅 FİKSTÜR</button>

        <button id="admin-toggle" class="control-btn" onclick="toggleAdmin()">⚙️ YÖNETİCİ</button>
        <button id="reset-db-btn" class="control-btn" onclick="resetDatabase()">⚠️ SIFIRLA</button>

        window.toggleLeague = function() {
            const btn = document.getElementById('league-toggle');
            const title = document.getElementById('league-title');

            if (currentLeague === 'lig1') {
                currentLeague = 'lig2';
                document.body.classList.add('lig2');
                title.innerText = "DiscordToto 2. Lig 2027-2028 Sezonu";
                btn.innerText = "🔄 1. LİG'E DÖN";
            } else {
                currentLeague = 'lig1';
                document.body.classList.remove('lig2');
                title.innerText = "DiscordToto 2027-2028 Sezonu";
                btn.innerText = "🔄 2. LİG'E GEÇ";
            }
            loadLeagueData(currentLeague);
        }

            // Zaten hep dark moddayız referanslar gereği,

            alert("Süper lig karanlığı hep bizimle!");
        }

        // Skor ve Veri İşlemleri (Değişmedi)
        window.setScore = function(index, side, val) {
            if(!isAdmin) return;
            const fixPath = currentLeague === 'lig1' ? 'fixtures' : 'fixtures_lig2';
            const newValue = val === "" ? null : parseInt(val);
            set(ref(db, `${fixPath}/${index}/${side}`), newValue);
        }

        window.setPenalty = function(teamName) {
            if(!isAdmin) return;
            const penPath = currentLeague === 'lig1' ? 'penalties' : 'penalties_lig2';
            let current = penaltiesData[teamName] || 0;
            let val = prompt(`${teamName} takımından SİLİNECEK toplam puanı girin:\n(Şu an silinen: ${current})`, current);
            if(val !== null) {
                set(ref(db, `${penPath}/${teamName}`), parseInt(val) || 0);
            }
        }

        // --- RENDER FONKSİYONLARI ---
        function renderAll() {
            const scrollPos = window.scrollY;
            const activeId = document.activeElement ? document.activeElement.id : null;
            const grid = document.getElementById('main-fixture-grid');
            grid.innerHTML = "";
            let currentWeek = 0;
            let weekHtml = "";

            fixtureData.forEach((m, i) => {
                if (m.w !== currentWeek) {
                    if (currentWeek !== 0) { weekHtml += `</div></div>`; grid.innerHTML += weekHtml; }
                    currentWeek = m.w;
                    weekHtml = `<div class="week-card"><div class="week-header"><span class="week-number">${currentWeek}</span><span class="week-label">Hafta</span></div><div class="match-list">`;
                }
                
                let hData = getTeamData(m.h);
                let aData = getTeamData(m.a);
                let center = isAdmin ? `<input type="number" id="hs-${i}" class="score-input" value="${m.hs ?? ''}" oninput="setScore(${i},'hs',this.value)"> <span class="vs">-</span> <input type="number" id="as-${i}" class="score-input" value="${m.as ?? ''}" oninput="setScore(${i},'as',this.value)">` : `<span class="vs">${(m.hs != null && m.as != null) ? m.hs + ' - ' + m.as : 'VS'}</span>`;
                
                weekHtml += `
                <div class="match-row">
                    <div class="match-teams">
                        <div class="team-box home">
                            <img src="${hData.logo}" class="mini-logo" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
                            <span>${hData.shortName}</span>
                        </div>
                        <div class="match-score">${center}</div>
                        <div class="team-box away">
                            <span>${aData.shortName}</span>
                            <img src="${aData.logo}" class="mini-logo" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
                        </div>
                    </div>
                    <div class="match-stadium-mini">🏟️ ${hData.stadium}</div>
                </div>`;
                
                if (i === fixtureData.length - 1) { weekHtml += `</div></div>`; grid.innerHTML += weekHtml; }
            });

            // Puan Durumu Render
            let statsMap = {};
            teamDetails.forEach(t => { statsMap[t.name] = { name: t.name, logo: t.logo, om:0, g:0, b:0, m:0, ag:0, yg:0, av:0, p:0 }; });
            
            fixtureData.forEach(m => {
                if (m.hs != null && m.as != null) {
                    let h = statsMap[m.h]; let a = statsMap[m.a];
                    if(h && a) {
                        h.om++; a.om++; h.ag += parseInt(m.hs); h.yg += parseInt(m.as); a.ag += parseInt(m.as); a.yg += parseInt(m.hs);
                        if (m.hs > m.as) { h.g++; h.p += 3; a.m++; } else if (m.as > m.hs) { a.g++; a.p += 3; h.m++; } else { h.b++; h.p++; a.b++; a.p++; }
                        h.av = h.ag - h.yg; a.av = a.ag - a.yg;
                    }
                }
            });

            Object.keys(penaltiesData).forEach(team => {
                if(statsMap[team]) statsMap[team].p -= parseInt(penaltiesData[team]);
            });

            let activeTeams = Object.values(statsMap).filter(t => t.om > 0 || fixtureData.some(m => m.h === t.name || m.a === t.name));
            let sortedStats = activeTeams.sort((a, b) => b.p - a.p || b.av - a.av || b.ag - a.ag);
            
            document.getElementById('standings-body').innerHTML = sortedStats.map((t, i) => {
                const penaltyBtn = isAdmin ? `<br><span onclick="setPenalty('${t.name}')" style="cursor:pointer; color:#e74c3c; font-size:0.6em; border:1px solid #e74c3c; padding:2px; border-radius:4px;">[SİL: ${penaltiesData[t.name] || 0}]</span>` : "";

                return `<tr>
                    <td>${i + 1}</td>
                    <td style="text-align:left; display:flex; align-items:center; gap: 15px;">
                        <img src="${t.logo}" style="width:30px; height:30px; object-fit:contain; cursor:pointer;" onclick="showTeam('${t.name}')">
                        <div>${t.name}${penaltyBtn}</div>
                    </td>
                    <td>${t.om}</td><td>${t.g}</td><td>${t.b}</td><td>${t.m}</td><td>${t.av}</td>
                    <td>${t.p}</td>
                </tr>`;
            }).join('');

            window.scrollTo(0, scrollPos);
            if(activeId) { document.getElementById(activeId)?.focus(); }
        }

        // Takım Detay Sayfası Render
        window.showTeam = function(name) {
            let tData = getTeamData(name);
            
            document.getElementById('team-view-header-content').innerHTML = `
                <img src="${tData.logo}" class="team-header-logo" onerror="this.style.display='none'">
                <h2 class="team-name-big">${tData.name}</h2>
                <div class="team-header-stadium">🏟️ ${tData.stadium}</div>
            `;

            const teamMatches = fixtureData.filter(m => m.h === name || m.a === name);
            document.getElementById('team-fixture-list').innerHTML = teamMatches.map(m => {
                const isHome = m.h === name; 
                const opponent = isHome ? m.a : m.h; 
                const oppData = getTeamData(opponent);
                const icon = isHome ? "🏠" : "✈️";
                let displayContent = (m.hs != null && m.as != null) ? `<span style="display:inline-block; width:35px; height:35px; line-height:35px; background:${((isHome && m.hs>m.as)||(!isHome && m.as>m.hs))?'#2ecc71':(m.hs==m.as?'#95a5a6':'#e74c3c')}; color:#000; border-radius:4px; text-align:center; font-weight:800; font-size: 0.9em;">${(m.hs==m.as?'B':((isHome && m.hs>m.as)||(!isHome && m.as>m.hs)?'G':'M'))}</span>` : `<span style="color:var(--text-sub); font-weight:700; font-size:0.9em;">VS</span>`;
                
                return `
                <div class="gs-match-card">
                    <div class="card-left">
                        <div class="week-badge">${m.w}.H</div>
                        <div class="location-icon">${icon}</div>
                        <img src="${oppData.logo}" style="width:28px; height:28px; object-fit:contain;" onerror="this.style.display='none'">
                        <div class="match-details">${oppData.name}</div>
                    </div>
                    <div class="stadium-info-list">
                        ${displayContent}
                    </div>
                </div>`;
            }).join('');
            showView('team');
        }

        // Temel JS Fonksiyonları (Logo Grid Güncelleme Eklendi)
        function updateLogoGrid() {
            const activeTeams = new Set();
            fixtureData.forEach(m => { activeTeams.add(m.h); activeTeams.add(m.a); });

            const gridHtml = teamDetails
                .filter(t => activeTeams.has(t.name))
                .sort((a,b) => a.name.localeCompare(b.name))
                .map(t => `<div class="team-logo-btn" style="background-image:url('${t.logo}')" onclick="showTeam('${t.name}')" title="${t.name}"></div>`)
                .join('');
            
            document.getElementById('logo-grid').innerHTML = gridHtml;
        }

        function loadLeagueData(leagueId) {
            if (unsubscribeFixtures) unsubscribeFixtures();
            if (unsubscribePenalties) unsubscribePenalties();

            document.getElementById('loading').style.display = 'block';

            const fixPath = leagueId === 'lig1' ? 'fixtures' : 'fixtures_lig2';
            const penPath = leagueId === 'lig1' ? 'penalties' : 'penalties_lig2';
            const activeDefaultFixture = leagueId === 'lig1' ? defaultFixtureData : defaultFixtureDataLig2;

            unsubscribePenalties = onValue(ref(db, penPath), (snapshot) => {
                penaltiesData = snapshot.val() || {};
                renderAll();
            });

            unsubscribeFixtures = onValue(ref(db, fixPath), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    fixtureData = activeDefaultFixture.map((correctMatch, i) => {
                        const dbMatch = data[i];
                        if (dbMatch && (dbMatch.hs !== undefined || dbMatch.as !== undefined)) {
                            return { ...correctMatch, hs: dbMatch.hs, as: dbMatch.as };
                        }
                        return correctMatch;
                    });
                } else {
                    fixtureData = JSON.parse(JSON.stringify(activeDefaultFixture));
                    set(ref(db, fixPath), fixtureData); 
                }
                document.getElementById('loading').style.display = 'none';
                if(document.getElementById('main-view').style.display === '') {
                    document.getElementById('main-view').style.display = 'block';
                }
                updateLogoGrid(); 
                renderAll();
            });
        }

        // View değiştirme fonksiyonu
        window.showView = function(view, el) {
            ['main-view', 'standings-view', 'team-view'].forEach(id => document.getElementById(id).style.display = 'none');
            if(el) { document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active')); el.classList.add('active'); }
            document.getElementById(view + '-view').style.display = 'block';
            document.querySelector('.team-selector-container').style.display = (view === 'standings') ? 'none' : 'block';
        }

        window.showMainView = function() { showView('main', document.querySelector('.top-controls .control-btn:nth-child(3)')); }

        window.toggleAdmin = function() {
            if (isAdmin) { isAdmin = false; } 
            else { let input = prompt("Yönetici Şifresi:"); if (input === ADMIN_PASSWORD) isAdmin = true; else { alert("Yanlış Şifre!"); return; } }
            const btn = document.getElementById('admin-toggle');
            btn.innerText = isAdmin ? "⚙️ DÜZENLEME AÇIK" : "⚙️ YÖNETİCİ";
            btn.classList.toggle('on', isAdmin);
            document.getElementById('reset-db-btn').style.display = isAdmin ? 'inline-block' : 'none';
            renderAll();
        }

        // Başlangıç
        loadLeagueData(currentLeague);

    </script>
</body>
</html>
